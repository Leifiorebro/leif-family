<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Personkort</title>
<style>
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:Segoe UI,Arial,sans-serif; background:#f4f7fb; color:#1f2937; }
  header{
    background:linear-gradient(90deg,#1d4ed8,#2563eb);
    color:white; padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  header h1{ margin:0; font-size:20px; font-weight:600; }
  header button{
    background:rgba(255,255,255,0.18); border:none; color:white;
    padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px;
  }
  header button:hover{ background:rgba(255,255,255,0.30); }

  main{ max-width:860px; margin:32px auto; padding:0 16px 60px; }

  .card{
    background:white; border-radius:16px;
    box-shadow:0 6px 24px rgba(0,0,0,.09);
    overflow:hidden;
  }

  /* ── Top hero row: photo + key facts ── */
  .hero{
    display:flex; gap:0; align-items:stretch;
  }
  .hero-photo{
    flex:0 0 220px; background:#e5e9f0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; min-height:220px;
  }
  .hero-photo img{
    width:220px; height:220px; object-fit:cover; display:block;
  }
  .hero-info{
    flex:1; padding:28px 28px 20px;
  }
  .hero-info h2{
    margin:0 0 6px; font-size:28px; font-weight:700; color:#111827;
  }
  .lifespan{
    font-size:15px; color:#6b7280; margin-bottom:20px;
  }
  .age-badge{
    display:inline-block; background:#dbeafe; color:#1d4ed8;
    font-size:13px; font-weight:600; padding:3px 10px;
    border-radius:999px; margin-left:10px;
  }

  /* ── Facts grid ── */
  .facts{
    display:grid; grid-template-columns:1fr 1fr; gap:14px 24px;
    margin-top:8px;
  }
  .fact label{
    display:block; font-size:11px; font-weight:600;
    text-transform:uppercase; letter-spacing:.05em; color:#9ca3af; margin-bottom:2px;
  }
  .fact span{
    font-size:15px; color:#111827;
  }
  .fact span:empty::before{ content:"—"; color:#d1d5db; }

  hr.divider{ border:none; border-top:1px solid #e5e7eb; margin:0; }

  /* ── History section ── */
  .history-section{ padding:24px 28px; }
  .history-section h3{
    margin:0 0 14px; font-size:17px; font-weight:600; color:#374151;
  }
  .history-text{
    font-family:'Lora', Georgia, serif;
    font-size:16px; line-height:1.9; color:#374151;
    white-space:pre-wrap; background:#fdfcfa;
    border-left:4px solid #93c5fd; padding:20px 22px;
    border-radius:0 10px 10px 0; margin:0;
    letter-spacing:0.01em;
  }
  .history-text:empty{ display:none; }

  /* ── Relations ── */
  .relations-section{ padding:0 28px 28px; }
  .relations-section h3{ margin:0 0 12px; font-size:17px; font-weight:600; color:#374151; }
  .rel-group{ margin-bottom:16px; }
  .rel-group h4{ font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:#9ca3af; margin:0 0 8px; }
  .rel-chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .rel-chip{
    background:#eff6ff; border:1px solid #bfdbfe; color:#1d4ed8;
    padding:5px 12px; border-radius:999px; font-size:13px;
    text-decoration:none; cursor:pointer;
  }
  .rel-chip:hover{ background:#dbeafe; }

  /* ── No-data state ── */
  .empty{ text-align:center; padding:60px 20px; color:#9ca3af; font-size:16px; }

  /* ── Fotosida link ── */
  .foto-link{
    display:inline-flex; align-items:center; gap:6px;
    background:#f0fdf4; border:1px solid #86efac; color:#166534;
    padding:7px 14px; border-radius:8px; font-size:13px;
    text-decoration:none; margin-top:16px; cursor:pointer;
  }
  .foto-link:hover{ background:#dcfce7; }

  @media(max-width:600px){
    .hero{ flex-direction:column; }
    .hero-photo{ flex:none; min-height:200px; width:100%; }
    .hero-photo img{ width:100%; height:200px; }
    .facts{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <h1 id="headerName">Personkort</h1>
  <div style="display:flex;gap:8px;">
    <button onclick="openFoto()">📷 Fotosida</button>
    <button onclick="window.close()">✕ Stäng</button>
  </div>
</header>

<main>
  <div id="content" class="card">
    <div class="empty">Laddar…</div>
  </div>
</main>

<script>
const DATA_URL = "data/slaktdata.json";

function getPersonId(){
  const p = new URLSearchParams(location.search);
  return p.get("id") || null;
}

function calcAge(born, died){
  if(!born) return null;
  const b = new Date(born);
  if(isNaN(b)) return null;
  const end = (died && !isNaN(new Date(died))) ? new Date(died) : new Date();
  let age = end.getFullYear() - b.getFullYear();
  const m = end.getMonth() - b.getMonth();
  if(m < 0 || (m === 0 && end.getDate() < b.getDate())) age--;
  if(age < 0 || age > 120) return null;
  return age;
}

function fmt(dateStr){
  if(!dateStr) return "";
  return dateStr; // already YYYY-MM-DD
}

function openFoto(){
  const id = getPersonId();
  if(id) window.open("fotosida.html?id=" + encodeURIComponent(id), "_blank");
}

async function loadData(){
  const pid = getPersonId();
  if(!pid){ showError("Ingen person angiven."); return; }

  let allData;
  try{
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    allData = await res.json();
  }catch(e){
    showError("Kunde inte ladda slaktdata.json: " + e.message);
    return;
  }

  const people    = allData.people    || allData || {};
  const parentsOf  = allData.parentsOf  || {};
  const childrenOf = allData.childrenOf || {};
  const spousesOf  = allData.spousesOf  || {};

  const p = people[pid];
  if(!p){ showError("Person '" + pid + "' hittades inte i databasen."); return; }

  document.title = p.name || "Personkort";
  document.getElementById("headerName").textContent = p.name || "Personkort";

  const age     = calcAge(p.born, p.died);
  const ageTxt  = age !== null ? (p.died ? age + " år" : age + " år (idag)") : "";

  // ── Build relations HTML ──
  function personChip(id){
    const per = people[id];
    if(!per) return "";
    const y = per.born ? per.born.slice(0,4) : "";
    const label = (per.name||id) + (y ? " ("+y+")" : "");
    return `<a class="rel-chip" href="person.html?id=${encodeURIComponent(id)}">${label}</a>`;
  }

  const parents  = (parentsOf[pid]  || []).filter(id => people[id]);
  const children = (childrenOf[pid] || []).filter(id => people[id]);
  const spouses  = [...new Set(spousesOf[pid] || [])].filter(id => people[id]);

  let relHtml = "";
  if(parents.length || children.length || spouses.length){
    relHtml = `<hr class="divider"><div class="relations-section"><h3>Relationer</h3>`;
    if(spouses.length)
      relHtml += `<div class="rel-group"><h4>Make / Maka</h4><div class="rel-chips">${spouses.map(personChip).join("")}</div></div>`;
    if(parents.length)
      relHtml += `<div class="rel-group"><h4>Föräldrar</h4><div class="rel-chips">${parents.map(personChip).join("")}</div></div>`;
    if(children.length)
      relHtml += `<div class="rel-group"><h4>Barn</h4><div class="rel-chips">${children.map(personChip).join("")}</div></div>`;
    relHtml += `</div>`;
  }

  // ── History ──
  const histHtml = p.history
    ? `<hr class="divider"><div class="history-section"><h3>Levnadshistoria</h3><div class="history-text">${escHtml(p.history)}</div></div>`
    : "";

  // ── Main card HTML ──
  document.getElementById("content").innerHTML = `
    <div class="hero">
      <div class="hero-photo">
        <img id="personPhoto" src="images/${escAttr(pid)}.jpg"
             onerror="this.src='images/default.jpg'"
             alt="${escAttr(p.name||"")}">
      </div>
      <div class="hero-info">
        <h2>${escHtml(p.name||"")}</h2>
        <div class="lifespan">
          ${escHtml(fmt(p.born)||"")}${p.born&&p.died?" – ":""}${escHtml(fmt(p.died)||"")}
          ${ageTxt ? `<span class="age-badge">${escHtml(ageTxt)}</span>` : ""}
        </div>
        <div class="facts">
          <div class="fact"><label>Födelseförsamling</label><span>${escHtml(p.bornParish||"")}</span></div>
          <div class="fact"><label>Dödsförsamling</label><span>${escHtml(p.diedParish||"")}</span></div>
          <div class="fact"><label>Yrke</label><span>${escHtml(p.job||"")}</span></div>
          <div class="fact"><label>Kön</label><span>${escHtml(p.gender==="M"?"Man":p.gender==="F"?"Kvinna":"")}</span></div>
        </div>
        <a class="foto-link" onclick="openFoto()">📷 Öppna fotosida</a>
      </div>
    </div>
    ${histHtml}
    ${relHtml}
  `;
}

function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function showError(msg){
  document.getElementById("content").innerHTML = `<div class="empty">${escHtml(msg)}</div>`;
}

loadData();
</script>
</body>
</html>

<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Familjesida – Inloggning</title>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f5f5f5;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:14px;
      box-shadow:0 8px 24px rgba(0,0,0,0.15);
      width:min(92vw, 420px);
    }

    h1{
      margin-top:0;
      font-size:28px;
      color:#2c3e50;
    }

    p{
      color:#555;
      line-height:1.5;
    }

    input{
      width:100%;
      padding:12px;
      font-size:16px;
      border:1px solid #ccc;
      border-radius:8px;
      margin:12px 0;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      font-size:16px;
      border:none;
      border-radius:8px;
      background:#2c7be5;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#1f66c2;
    }

    .error{
      color:#b00020;
      margin-top:10px;
      min-height:22px;
      font-size:14px;
    }

    .small{
      margin-top:16px;
      font-size:13px;
      color:#777;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Välkommen</h1>
    <p>Den här släktsidan är bara avsedd för familj och vänner. Ange lösenord för att fortsätta.</p>

    <input type="password" id="pw" placeholder="Lösenord" autocomplete="current-password">
    <button onclick="checkPassword()">Öppna släktsidan</button>

    <div class="error" id="msg"></div>

    <div class="small">
      Obs: Detta är ett enkelt familjelås, inte ett fullständigt säkerhetsskydd.
    </div>
  </div>

  <script>
    // ===== ÄNDRA DETTA LÖSENORD =====
    const FAMILY_PASSWORD = "mitthemligalosen";

    function checkPassword(){
      const value = document.getElementById("pw").value;

      if(value === FAMILY_PASSWORD){
        localStorage.setItem("familyAccessGranted", "yes");
        window.location.href = "index.html";
      }else{
        document.getElementById("msg").textContent = "Fel lösenord. Försök igen.";
      }
    }

    document.getElementById("pw").addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        checkPassword();
      }
    });
  </script>

</body>
</html>

<script>
const DISABLE_INDEXEDDB =
  navigator.userAgent.includes("OPR/") ||
  navigator.userAgent.includes("Opera");


console.log("INDEX STARTAR");

/* ======== DATASTRUKTUR ========= */
let db = null;

const STORAGE = "fam_v10_fixed_age";
let store = { people:{}, parentsOf:{}, childrenOf:{}, spousesOf:{}, currentId:null };

function buildGraph(){

  const nodes = [];
  const links = [];

  Object.keys(store.people).forEach(id=>{
    const p = store.people[id];

    nodes.push({
      id:id,
      name:p.name
    });
  });

  Object.keys(store.parentsOf).forEach(child=>{
    const parents = store.parentsOf[child] || [];

    parents.forEach(parent=>{
      links.push({
        source:parent,
        target:child
      });
    });
  });

  return {nodes,links};
}

function drawWholeFamily(){

  const graph = buildGraph();

  const svg = d3.select("#tree");
  svg.selectAll("*").remove();

  const g = svg.append("g");

  const zoom = d3.zoom().on("zoom",(event)=>{
    g.attr("transform",event.transform);
  });

  svg.call(zoom);

  const simulation = d3.forceSimulation(graph.nodes)
    .force("link", d3.forceLink(graph.links).id(d=>d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2));

  const link = g.selectAll(".link")
    .data(graph.links)
    .enter()
    .append("line")
    .attr("class","link");

  const node = g.selectAll(".node")
    .data(graph.nodes)
    .enter()
    .append("g")
    .attr("class","node");

  node.append("circle")
    .attr("r",22);

  node.append("text")
    .attr("dy",4)
    .attr("text-anchor","middle")
    .text(d=>d.name);

  simulation.on("tick",()=>{

    link
      .attr("x1",d=>d.source.x)
      .attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x)
      .attr("y2",d=>d.target.y);

    node.attr("transform",d=>`translate(${d.x},${d.y})`);

  });

  node.call(
    d3.drag()
      .on("start",(event,d)=>{
        if(!event.active) simulation.alphaTarget(0.3).restart();
        d.fx=d.x;
        d.fy=d.y;
      })
      .on("drag",(event,d)=>{
        d.fx=event.x;
        d.fy=event.y;
      })
      .on("end",(event,d)=>{
        if(!event.active) simulation.alphaTarget(0);
        d.fx=null;
        d.fy=null;
      })
  );

}



function buildHierarchy(rootId){

  function build(id){

    const p = store.people[id];
    if(!p) return null;

    const kids = [];

    Object.keys(store.parentsOf).forEach(cid=>{
      if((store.parentsOf[cid]||[]).includes(id)){
        const child = build(cid);
        if(child) kids.push(child);
      }
    });

    return {
      id:id,
      name:p.name,
      born:p.born,
      children:kids
    };

  }

  return build(rootId);
}

	function drawGenerationTree(rootId){

  const svg = d3.select("#tree");
  svg.selectAll("*").remove();

  const width = 1600;
  const height = 1200;

  const g = svg.append("g");

  svg.call(
    d3.zoom().scaleExtent([0.2,4])
      .on("zoom",(e)=>g.attr("transform",e.transform))
  );

  const nodes = {};
  const links = [];

  const levelHeight = 140;
  const spouseGap = 120;
  const siblingGap = 140;

  function addNode(id,x,y){
    if(!nodes[id]){
      nodes[id] = {id,x,y};
    }
  }

  function addLink(a,b,type="child"){
    links.push({source:a,target:b,type});
  }

  /* bygg generationer */

  function buildUp(id,level,x){

    const parents = store.parentsOf[id] || [];
    const y = height/2 - levelHeight*level;

    parents.forEach((pid,i)=>{

      const px = x + (i===0 ? -siblingGap : siblingGap);

      addNode(pid,px,y);
      addLink(pid,id);

      const spouse = (store.spousesOf[pid]||[])[0];
      if(spouse){
        addNode(spouse,px+spouseGap,y);
        addLink(pid,spouse,"spouse");
      }

      buildUp(pid,level+1,px);

    });

  }

  function buildDown(id,level,x){

    const kids = store.childrenOf[id] || [];
    const y = height/2 + levelHeight*level;

    kids.forEach((cid,i)=>{

      const cx = x + (i - kids.length/2)*siblingGap;

      addNode(cid,cx,y);
      addLink(id,cid);

      const spouse = (store.spousesOf[cid]||[])[0];
      if(spouse){
        addNode(spouse,cx+spouseGap,y);
        addLink(cid,spouse,"spouse");
      }

      buildDown(cid,level+1,cx);

    });

  }

  addNode(rootId,width/2,height/2);

  buildUp(rootId,1,width/2);
  buildDown(rootId,1,width/2);

  const nodeList = Object.values(nodes);

  /* rita länkar */

  g.selectAll("line")
    .data(links)
    .enter()
    .append("line")
    .attr("x1",d=>nodes[d.source].x)
    .attr("y1",d=>nodes[d.source].y)
    .attr("x2",d=>nodes[d.target].x)
    .attr("y2",d=>nodes[d.target].y)
    .attr("stroke",d=>d.type==="spouse"?"#d33":"#999")
    .attr("stroke-width",2);

  /* noder */

  const node = g.selectAll(".node")
    .data(nodeList)
    .enter()
    .append("g")
    .attr("transform",d=>`translate(${d.x},${d.y})`)
    .style("cursor","pointer");

  node.append("rect")
    .attr("x",-70)
    .attr("y",-30)
    .attr("width",140)
    .attr("height",60)
    .attr("rx",8)
    .attr("fill","#fff")
    .attr("stroke","#333");

  node.append("text")
    .attr("text-anchor","middle")
    .attr("dy","-4")
    .attr("font-weight","bold")
    .text(d=>store.people[d.id]?.name || "");

  node.append("text")
    .attr("text-anchor","middle")
    .attr("dy","14")
    .attr("font-size","11px")
    .text(d=>store.people[d.id]?.born || "");

  node.on("click",(e,d)=>{
    store.currentId = d.id;
    drawGenerationTree(d.id);
  });

}


/* ======== UTILITY ======== */
function id(){ return "p_"+Math.random().toString(36).substr(2,9); }
function ensure(a){ return Array.isArray(a)?a:[]; }

function blobToBase64(blob) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.readAsDataURL(blob);
  });
}

function base64ToBlob(base64, mime) {
  const bin = atob(base64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) {
    arr[i] = bin.charCodeAt(i);
  }
  return new Blob([arr], { type: mime });
}

    localStorage.setItem(STORAGE, JSON.stringify(store));

function createPerson(data = {}) {

    id: data.id || id(),
    name: data.name || '',
    role: data.role || '',

    born: data.born || '',
    bornParish: data.bornParish || '',
    died: data.died || '',
    diedParish: data.diedParish || '',

    job: data.job || '',
    history: data.history || '',

    photoId: data.photoId || null
  };
}




async function importImages(images){
  if (!idb) {
    console.log("IndexedDB ej tillgänglig – hoppar över bilder");
    return;
  }

  for (const img of images) {
    const blob = base64ToBlob(img.base64, img.mime);

    await new Promise((res, rej) => {
      const tx = idb.transaction('images', 'readwrite');
      tx.objectStore('images').put({
        id: img.id,
        personId: img.personId,
        blob
      });
      tx.oncomplete = res;
      tx.onerror = rej;
    });
  }

  console.log("Alla bilder importerade");
}

async function exportWebPackage() {

  console.log("WEBB-EXPORT startar…");

  const MAX_WIDTH = 1600;
  const JPEG_QUALITY = 0.82;

  const data = {
    version: 3,
    people: store.people,
    parentsOf: store.parentsOf,
    childrenOf: store.childrenOf,
    spousesOf: store.spousesOf,
    currentId: store.currentId
  };

  const imageFiles = [];

  if (idb) {
    await new Promise((resolve, reject) => {
      const tx = idb.transaction('images', 'readonly');
      const os = tx.objectStore('images');
      const req = os.openCursor();

      req.onsuccess = async e => {
        const cur = e.target.result;
        if (!cur) return resolve();

        if (cur.value?.blob instanceof Blob) {

          const bitmap = await createImageBitmap(cur.value.blob);

          let w = bitmap.width;
          let h = bitmap.height;

          if (w > MAX_WIDTH) {
            const ratio = MAX_WIDTH / w;
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }

          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;

          const ctx = canvas.getContext('2d');
          ctx.drawImage(bitmap, 0, 0, w, h);

          const blob = await new Promise(res =>
            canvas.toBlob(res, "image/jpeg", JPEG_QUALITY)
          );

          const fileName = cur.key + ".jpg";

          imageFiles.push({
            name: fileName,
            blob
          });

          // 🔑 spara endast filnamn i personen
          const person = Object.values(store.people)
            .find(p => p.photoId === cur.key);

          if (person) {
            person.photoId = fileName;
          }

          bitmap.close?.();
        }

        cur.continue();
      };

      req.onerror = reject;
    });
  }

  /* === Ladda ner JSON === */

  downloadFile(
    new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }),
    "slaktdata.json"
  );

  /* === Ladda ner alla bilder === */

  for (const file of imageFiles) {
    downloadFile(file.blob, file.name);
  }

  alert("WEBB-EXPORT klar!\nLägg JSON i /data\nLägg JPG i /images");
}

function downloadFile(blob, filename) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(a.href);
    a.remove();
  }, 500);
}

// 1️⃣ Återställ store – MEN säkert
store = {

};

// 2️⃣ Bygg personer korrekt

saveStore();

      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });
  }

  

  /* ========= 4) Reload + render ========= */
  await loadPersonsFromDB();
  render();

  alert("Import klar!");
}

/* ======== INDEXED DB ======== */
const DB_NAME = 'FotosidaDB';
const DB_VER  = 5;
let idb = null;


function openDB() {
  if (DISABLE_INDEXEDDB) {
    console.warn("IndexedDB avstängt i Opera");
    idb = null;
    return Promise.resolve();
  }

  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME);

    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('persons'))
        d.createObjectStore('persons', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('images'))
        d.createObjectStore('images', { keyPath: 'id' });
    };

    req.onsuccess = () => {
      idb = req.result;
      resolve();
    };

    req.onerror = () => reject(req.error);
  });
}

async function loadPersonsFromDB(){
  if (!idb) return;

  const tx = idb.transaction('persons','readonly');
  const os = tx.objectStore('persons');
  const req = os.getAll();

  await new Promise(res => {
    req.onsuccess = () => {
      for (const p of req.result) {
        if (!store.people[p.id]) {
          store.people[p.id] = p; // komplettera
        }
      }
      res();
    };
  });

  console.log("Persons laddade:", Object.keys(store.people).length);
}







function isFather(pid) {

  return p?.role === 'Far' || p?.role === 'FAR';
}

function isMother(pid) {
  const p = store.people[pid];
  return p?.role === 'Mor' || p?.role === 'MOR';
}

function addPersonWithRelation(type) {
  const curId = store.currentId;
  if (!curId) {
    alert('Ingen aktuell person vald');
    return;
  }

  const newId = id();
  const newPerson = { id: newId, name: '' };
  store.people[newId] = newPerson;

  /* ================= FÖRÄLDER ================= */
  if (type === 'MOR' || type === 'FAR') {

    store.parentsOf[curId] ||= [null, null];

    if (type === 'MOR') {
      store.parentsOf[curId][0] = newId;
      newPerson.role = 'Mor';
    }

    if (type === 'FAR') {
      store.parentsOf[curId][1] = newId;
      newPerson.role = 'Far';
    }

    store.childrenOf[newId] ||= [];
    if (!store.childrenOf[newId].includes(curId)) {
      store.childrenOf[newId].push(curId);
    }

    /* AUTO-KOPPLA MAKA/MAKE */
    const mor = store.parentsOf[curId][0];
    const far = store.parentsOf[curId][1];

    if (mor && far) {
      store.spousesOf[mor] ||= [];
      store.spousesOf[far] ||= [];

      if (!store.spousesOf[mor].includes(far))
        store.spousesOf[mor].push(far);

      if (!store.spousesOf[far].includes(mor))
        store.spousesOf[far].push(mor);
    }
  }

  /* ================= BARN ================= */
  
  
  if (type === 'BARN') {
  newPerson.role = 'Barn';

  // koppla barn → aktuell förälder
  store.childrenOf[curId] ||= [];
  store.childrenOf[curId].push(newId);

  // säkerställ tvåplatssystem
  store.parentsOf[newId] ||= [null, null];

  // sätt aktuell person som mor eller far
  if (isMother(curId)) {
    store.parentsOf[newId][0] = curId; // Mor
  } 
  else if (isFather(curId)) {
    store.parentsOf[newId][1] = curId; // Far
  }

  /* ===== AUTO-KOPPLA ANDRA FÖRÄLDERN VIA MAKA/MAKE ===== */
  const spouses = store.spousesOf[curId] || [];
  if (spouses.length > 0) {
    const otherParent = spouses[0]; // enklaste: första maken/makan

    if (isMother(otherParent)) {
      store.parentsOf[newId][0] ||= otherParent;
    }
    else if (isFather(otherParent)) {
      store.parentsOf[newId][1] ||= otherParent;
    }

    // se till att även den andra föräldern får barnet i sin barnlista
    store.childrenOf[otherParent] ||= [];
    if (!store.childrenOf[otherParent].includes(newId)) {
      store.childrenOf[otherParent].push(newId);
    }
  }
}

  /* ================= MAKA / MAKE ================= */
  if (type === 'MAKA') {
    newPerson.role = 'Maka/Make';

    store.spousesOf[curId] ||= [];
    store.spousesOf[curId].push(newId);

    store.spousesOf[newId] ||= [];
    store.spousesOf[newId].push(curId);
  }

  store.currentId = newId;
  saveStore();
  render();
  refreshPersonList();
}

async function deletePerson(pid) {
  const p = store.people[pid];
  if (!p) return;

  /* === TA BORT FOTO === */
  if (p.photoId && idb) {
    await new Promise(res => {
      const tx = idb.transaction('images', 'readwrite');
      tx.objectStore('images').delete(p.photoId);
      tx.oncomplete = res;
    });
  }

  /* === TA BORT RELATIONER === */

  // Ta bort från parentsOf
  for (const cid in store.parentsOf) {
    store.parentsOf[cid] =
      store.parentsOf[cid].filter(id => id !== pid);
    if (!store.parentsOf[cid].length) delete store.parentsOf[cid];
  }

  // Ta bort från childrenOf
  for (const cid in store.childrenOf) {
    store.childrenOf[cid] =
      store.childrenOf[cid].filter(id => id !== pid);
    if (!store.childrenOf[cid].length) delete store.childrenOf[cid];
  }

  // Ta bort från spousesOf
  for (const sid in store.spousesOf) {
    store.spousesOf[sid] =
      store.spousesOf[sid].filter(id => id !== pid);
    if (!store.spousesOf[sid].length) delete store.spousesOf[sid];
  }

  /* === TA BORT PERSON === */
  delete store.people[pid];

  if (store.currentId === pid) {
    store.currentId = Object.keys(store.people)[0] || null;
  }

  saveStore();

  /* === TA BORT FRÅN INDEXEDDB === */
  if (idb) {
    await new Promise(res => {
      const tx = idb.transaction('persons', 'readwrite');
      tx.objectStore('persons').delete(pid);
      tx.oncomplete = res;
    });
  }

  render();
  refreshPersonList();
}

  const children = store.childrenOf?.[curId] || [];

  if(spouses.includes(pid)) return 'MAKA/MAKE';

  return '';

function autoBuildRelations(){

  const people = store.people;

  const parentsOf = {};
  const childrenOf = {};
  const spousesOf = {};

  const mothers = [];
  const fathers = [];
  const children = [];

  Object.entries(people).forEach(([id,p])=>{

    if(!p.role) return;

    const r = p.role.toLowerCase();

    if(r.includes("mor")) mothers.push(id);
    if(r.includes("far")) fathers.push(id);
    if(r.includes("barn")) children.push(id);

  });

  mothers.forEach((mid,i)=>{

    const fid = fathers[i];
    if(!fid) return;

    spousesOf[mid] = [fid];
    spousesOf[fid] = [mid];

  });

  children.forEach((cid,i)=>{

    const mid = mothers[Math.floor(i/3)] || mothers[0];
    const fid = fathers[Math.floor(i/3)] || fathers[0];

    if(!mid || !fid) return;

    parentsOf[cid] = [fid,mid];

    if(!childrenOf[mid]) childrenOf[mid]=[];
    if(!childrenOf[fid]) childrenOf[fid]=[];

    childrenOf[mid].push(cid);
    childrenOf[fid].push(cid);

  });

  store.parentsOf = parentsOf;
  store.childrenOf = childrenOf;
  store.spousesOf = spousesOf;

  console.log(
    "Relationer skapade:",
    Object.keys(parentsOf).length,"parents"
  );

}

	function rebuildRelations(){

  store.parentsOf = {};
  store.childrenOf = {};
  store.spousesOf = {};

  Object.entries(store.people).forEach(([id,p])=>{

    /* ===== FÖRÄLDRAR ===== */

    const parents = [];

    if(p.parents) parents.push(...p.parents);

    if(p.father) parents.push(p.father);
    if(p.mother) parents.push(p.mother);

    if(parents.length){

      store.parentsOf[id] = parents;

      parents.forEach(parentId=>{

        if(!store.childrenOf[parentId])
          store.childrenOf[parentId] = [];

        store.childrenOf[parentId].push(id);

      });

    }

    /* ===== PARTNER ===== */

    const spouses = [];

    if(p.spouses) spouses.push(...p.spouses);

    if(p.spouse) spouses.push(p.spouse);
    if(p.partner) spouses.push(p.partner);

    if(spouses.length){

      store.spousesOf[id] = spouses;

      spouses.forEach(sid=>{

        if(!store.spousesOf[sid])
          store.spousesOf[sid] = [];

        if(!store.spousesOf[sid].includes(id))
          store.spousesOf[sid].push(id);

      });

    }

  });

  console.log(
    "Relationer:",
    Object.keys(store.parentsOf).length,"parents",
    Object.keys(store.childrenOf).length,"children",
    Object.keys(store.spousesOf).length,"spouses"
  );

}
	
	

if(!store.currentId || !store.people[store.currentId]){
  store.currentId = Object.keys(store.people)[0];
}
	
	console.log(
  "Relationer:",
  Object.keys(store.parentsOf).length,
  "parents",
  Object.keys(store.childrenOf).length,
  "children"
	);
	
	

    console.log(
      "SERVER LOAD klar:",
      Object.keys(store.people).length,
      "personer"
    );

    return true;

  }catch(err){

    console.error("SERVER LOAD fel:", err);
    return false;

  }
}

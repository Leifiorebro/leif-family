<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leifs Släktprogram – Version 3</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f1ea;
    color:#222;
  }
  header{
    background:#5c4033;
    color:white;
    padding:12px 16px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  header h1{
    margin:0;
    font-size:20px;
    margin-right:16px;
  }
  button,input,select{
    font-size:14px;
    padding:6px 10px;
  }
  #tree{
    padding:20px;
    overflow:auto;
    min-height:70vh;
  }
  .gen{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:18px 0;
    flex-wrap:wrap;
  }
  .personBox{
    width:220px;
    background:#fff;
    border:2px solid #c9b79c;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.12);
    cursor:pointer;
    overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease;
    position:relative;
  }
  .personBox:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(0,0,0,0.18);
  }
  .personBox.current{
    border-color:#8b4513;
    box-shadow:0 0 0 3px rgba(139,69,19,.18);
  }
  .cardHeader{
    background:#8b6b4a;
    color:#fff;
    font-weight:bold;
    padding:8px;
    text-align:center;
    font-size:15px;
  }
  .photo{
    height:160px;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .info{
    padding:8px 10px;
    font-size:13px;
    line-height:1.4;
  }
  .subline{
    font-size:12px;
    color:#666;
  }
  .treeLabel{
    text-align:center;
    font-weight:bold;
    color:#6a4a2b;
    margin-top:8px;
  }
  .connector{
    text-align:center;
    font-size:22px;
    color:#8b6b4a;
    line-height:1;
  }

  #editor{
    position:fixed;
    top:0;
    right:0;
    width:420px;
    max-width:95vw;
    height:100vh;
    background:#fff;
    box-shadow:-4px 0 18px rgba(0,0,0,0.2);
    padding:16px;
    overflow:auto;
    display:none;
    z-index:999;
  }
  #editor h2{
    margin-top:0;
    color:#5c4033;
  }
  .field{
    margin-bottom:10px;
  }
  .field label{
    display:block;
    font-size:13px;
    font-weight:bold;
    margin-bottom:3px;
  }
  .field input, .field textarea, .field select{
    width:100%;
    box-sizing:border-box;
  }
  .row{
    display:flex;
    gap:8px;
  }
  .row > div{
    flex:1;
  }
  .relationList{
    background:#f7f3ec;
    border:1px solid #d9cbb7;
    border-radius:8px;
    padding:8px;
    margin-bottom:10px;
  }
  .relItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin:4px 0;
    padding:4px 6px;
    background:#fff;
    border-radius:6px;
    border:1px solid #e3d7c7;
  }
  .smallBtn{
    padding:3px 7px;
    font-size:12px;
    cursor:pointer;
  }
  .searchBlock{
    background:#f7f3ec;
    border:1px solid #d9cbb7;
    border-radius:8px;
    padding:8px;
    margin-bottom:12px;
  }
  .searchResults{
    max-height:140px;
    overflow:auto;
    margin-top:6px;
    border-top:1px solid #ddd;
    padding-top:6px;
  }
  .searchItem{
    display:flex;
    justify-content:space-between;
    gap:8px;
    padding:4px 0;
    border-bottom:1px dashed #ddd;
  }
  #overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
    display:none;
    z-index:998;
  }
  .hint{
    font-size:12px;
    color:#555;
  }
</style>
</head>
<body>

<header>
  <h1>Leifs Släktprogram – Version 3</h1>
  <button onclick="loadFromServer(true)">Ladda om från slaktdata.json</button>
  <button onclick="document.getElementById('fileInput').click()">Importera JSON</button>
  <button onclick="exportJSON()">Exportera JSON</button>
  <button onclick="clearLocalEdits()">Rensa lokala ändringar</button>
  <button onclick="drawGenealogy(store.currentId)">Rita om</button>
  <span class="hint">Klicka på en person i trädet = ny rot + öppna redigering</span>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</header>

<div id="tree"></div>

<div id="overlay" onclick="closeEditor()"></div>

<div id="editor">
  <h2 id="editorTitle">Redigera person</h2>

  <div class="field">
    <label>Namn</label>
    <input id="e_name">
  </div>

  <div class="field">
    <label>Roll</label>
    <input id="e_role">
  </div>

  <div class="row">
    <div class="field">
      <label>Född</label>
      <input id="e_born" placeholder="YYYY-MM-DD">
    </div>
    <div class="field">
      <label>Död</label>
      <input id="e_died" placeholder="YYYY-MM-DD">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Födelseförsamling</label>
      <input id="e_bornParish">
    </div>
    <div class="field">
      <label>Dödsförsamling</label>
      <input id="e_diedParish">
    </div>
  </div>

  <div class="field">
    <label>Yrke</label>
    <input id="e_job">
  </div>

  <div class="field">
    <label>Foto-fil (photoId, t.ex. martin.jpg)</label>
    <input id="e_photoId">
  </div>

  <div class="field">
    <label>Historik / anteckning</label>
    <textarea id="e_history" rows="4"></textarea>
  </div>

  <button onclick="saveEditor()">Spara person</button>
  <button onclick="makeCurrentRoot()">Gör till ny rot</button>
  <button onclick="closeEditor()">Stäng</button>

  <hr>

  <h3>Relationer</h3>

  <div class="relationList">
    <strong>Föräldrar</strong>
    <div id="parentsList"></div>
  </div>

  <div class="relationList">
    <strong>Barn</strong>
    <div id="childrenList"></div>
  </div>

  <div class="relationList">
    <strong>Make / maka</strong>
    <div id="spousesList"></div>
  </div>

  <hr>

  <h3>Koppla befintliga personer</h3>

  <div class="searchBlock">
    <div class="field">
      <label>Sök person</label>
      <input id="linkSearch" oninput="searchExisting()" placeholder="Skriv namn...">
    </div>

    <div class="field">
      <label>Koppla som</label>
      <select id="linkType">
        <option value="parent">Förälder till vald person</option>
        <option value="child">Barn till vald person</option>
        <option value="spouse">Make/maka till vald person</option>
      </select>
    </div>

    <div class="searchResults" id="searchResults"></div>
  </div>

  <hr>

  <h3>Skapa ny person + koppla direkt</h3>

  <div class="field">
    <label>Namn</label>
    <input id="new_name">
  </div>
  <div class="field">
    <label>Koppla ny person som</label>
    <select id="newRelType">
      <option value="parent">Förälder</option>
      <option value="child">Barn</option>
      <option value="spouse">Make/maka</option>
    </select>
  </div>
  <button onclick="createAndLink()">Skapa och koppla</button>

  <hr>

  <button onclick="deleteCurrentPerson()" style="background:#a33;color:#fff;">Ta bort person</button>
</div>

<script>
console.log("INDEX STARTAR");

const SERVER_JSON = "data/slaktdata.json";
const LOCAL_KEY = "leif_family_store_v3";

let store = {
  people: {},
  parentsOf: {},
  childrenOf: {},
  spousesOf: {},
  currentId: null
};

let editingId = null;

/* =========================================================
   Hjälpfunktioner
========================================================= */

function saveStore(){
  localStorage.setItem(LOCAL_KEY, JSON.stringify(store));
}

function loadStore(){
  const raw = localStorage.getItem(LOCAL_KEY);
  if(!raw) return false;
  try{
    const obj = JSON.parse(raw);
    if(obj && obj.people){
      store = obj;
      store.parentsOf ||= {};
      store.childrenOf ||= {};
      store.spousesOf ||= {};
      return true;
    }
  }catch(e){
    console.warn("Kunde inte läsa localStorage:", e);
  }
  return false;
}

function normalizeStore(){
  store.people ||= {};
  store.parentsOf ||= {};
  store.childrenOf ||= {};
  store.spousesOf ||= {};
}

function generateId(){
  return "p_" + Math.random().toString(36).slice(2,11);
}

function getPerson(id){
  return store.people[id] || null;
}

function getName(id){
  return store.people[id]?.name || id;
}

function ensureArrayMap(map, key){
  if(!map[key]) map[key] = [];
  return map[key];
}

function uniquePush(arr, value){
  if(!arr.includes(value)) arr.push(value);
}

function removeFromArray(arr, value){
  const i = arr.indexOf(value);
  if(i >= 0) arr.splice(i,1);
}

function sortIdsByName(ids){
  return [...ids].sort((a,b)=>getName(a).localeCompare(getName(b), "sv"));
}

function getImagePath(id){
  const p = store.people[id];
  if(!p) return "images/default.jpg";
  if(p.photoId && p.photoId.trim()) return "images/" + p.photoId.trim();
  return "images/" + id + ".jpg";
}

/* =========================================================
   Laddning
========================================================= */

async function loadFromServer(force=false){
  console.log("SERVER LOAD startar");
  try{
    const res = await fetch(SERVER_JSON + "?v=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    if(force || !localStorage.getItem(LOCAL_KEY)){
      store = data;
      normalizeStore();
      rebuildChildren();
      ensureSpousesSymmetry();
      store.currentId ||= findBestRoot();
      saveStore();
      drawGenealogy(store.currentId);
    }

    console.log("SERVER LOAD klar:", Object.keys(store.people).length, "personer");
    return true;
  }catch(err){
    console.error("SERVER LOAD fel:", err);
    alert("Kunde inte ladda data/slaktdata.json");
    return false;
  }
}

function clearLocalEdits(){
  if(!confirm("Rensa lokala ändringar och återgå till data/slaktdata.json?")) return;
  localStorage.removeItem(LOCAL_KEY);
  loadFromServer(true);
}

document.getElementById("fileInput").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    const txt = await file.text();
    const data = JSON.parse(txt);
    store = data;
    normalizeStore();
    rebuildChildren();
    ensureSpousesSymmetry();
    store.currentId ||= findBestRoot();
    saveStore();
    drawGenealogy(store.currentId);
    alert("JSON importerad.");
  }catch(err){
    console.error(err);
    alert("Fel vid import av JSON.");
  }
  e.target.value = "";
});

/* =========================================================
   Relationer
========================================================= */

function rebuildChildren(){
  store.childrenOf = {};
  for(const childId of Object.keys(store.parentsOf || {})){
    const parents = store.parentsOf[childId] || [];
    for(const parentId of parents){
      if(!store.people[parentId]) continue;
      ensureArrayMap(store.childrenOf, parentId);
      uniquePush(store.childrenOf[parentId], childId);
    }
  }
}

function ensureSpousesSymmetry(){
  for(const id of Object.keys(store.spousesOf || {})){
    const list = store.spousesOf[id] || [];
    for(const sid of list){
      if(!store.people[sid]) continue;
      ensureArrayMap(store.spousesOf, sid);
      uniquePush(store.spousesOf[sid], id);
    }
  }
}

function linkParent(childId, parentId){
  if(childId === parentId) return;
  if(!store.people[childId] || !store.people[parentId]) return;

  ensureArrayMap(store.parentsOf, childId);
  uniquePush(store.parentsOf[childId], parentId);

  rebuildChildren();
  saveStore();
}

function unlinkParent(childId, parentId){
  if(!store.parentsOf[childId]) return;
  removeFromArray(store.parentsOf[childId], parentId);
  if(store.parentsOf[childId].length === 0) delete store.parentsOf[childId];

  rebuildChildren();
  saveStore();
}

function linkChild(parentId, childId){
  linkParent(childId, parentId);
}

function unlinkChild(parentId, childId){
  unlinkParent(childId, parentId);
}

function linkSpouse(a, b){
  if(a === b) return;
  if(!store.people[a] || !store.people[b]) return;

  ensureArrayMap(store.spousesOf, a);
  ensureArrayMap(store.spousesOf, b);
  uniquePush(store.spousesOf[a], b);
  uniquePush(store.spousesOf[b], a);

  saveStore();
}

function unlinkSpouse(a, b){
  if(store.spousesOf[a]) removeFromArray(store.spousesOf[a], b);
  if(store.spousesOf[b]) removeFromArray(store.spousesOf[b], a);

  if(store.spousesOf[a] && store.spousesOf[a].length === 0) delete store.spousesOf[a];
  if(store.spousesOf[b] && store.spousesOf[b].length === 0) delete store.spousesOf[b];

  saveStore();
}

/* =========================================================
   Startperson / rot
========================================================= */

function findBestRoot(){
  const ids = Object.keys(store.people);
  if(ids.length === 0) return null;

  // 1) någon utan föräldrar men med barn
  const candidate = ids.find(id => (!store.parentsOf[id] || store.parentsOf[id].length===0) &&
                                   (store.childrenOf[id] && store.childrenOf[id].length>0));
  if(candidate) return candidate;

  // 2) första med barn
  const candidate2 = ids.find(id => store.childrenOf[id]?.length);
  if(candidate2) return candidate2;

  // 3) annars första person
  return ids[0];
}

/* =========================================================
   Kort / layout
========================================================= */

function createCard(id){
  const p = store.people[id];
  if(!p) return document.createElement("div");

  const c = document.createElement("div");
  c.className = "personBox";
  if(id === store.currentId) c.classList.add("current");

  c.onclick = (ev)=>{
    ev.stopPropagation();
    store.currentId = id;
    saveStore();
    drawGenealogy(id);
    openEditor(id);
  };

  const img = getImagePath(id);

  c.innerHTML = `
    <div class="cardHeader">${p.name || ""}</div>
    <div class="photo">
      <img src="${img}" onerror="this.src='images/default.jpg'">
    </div>
    <div class="info">
      <div>${p.born || ""} ${p.died ? "– " + p.died : ""}</div>
      <div class="subline">${p.job || ""}</div>
      <div class="subline">${p.bornParish || ""}${p.diedParish ? " • " + p.diedParish : ""}</div>
    </div>
  `;
  return c;
}

function rowOfCards(ids){
  const row = document.createElement("div");
  row.className = "gen";
  sortIdsByName(ids).forEach(id => row.appendChild(createCard(id)));
  return row;
}

function label(text){
  const d = document.createElement("div");
  d.className = "treeLabel";
  d.textContent = text;
  return d;
}

function connector(){
  const d = document.createElement("div");
  d.className = "connector";
  d.textContent = "↓";
  return d;
}

/* =========================================================
   Rita träd – snyggare genealogisk layout
========================================================= */

function drawGenealogy(rootId){
  if(!rootId || !store.people[rootId]) return;

  store.currentId = rootId;
  saveStore();

  const tree = document.getElementById("tree");
  tree.innerHTML = "";

  const root = store.people[rootId];
  const parents = sortIdsByName(store.parentsOf[rootId] || []);
  const spouses = sortIdsByName(store.spousesOf[rootId] || []);
  const children = sortIdsByName(store.childrenOf[rootId] || []);

  // Far-/morföräldrar till rotens föräldrar
  let grandParents = [];
  for(const pid of parents){
    const gp = store.parentsOf[pid] || [];
    grandParents.push(...gp);
  }
  grandParents = [...new Set(grandParents)];

  if(grandParents.length){
    tree.appendChild(label("Far- och morföräldrar"));
    tree.appendChild(rowOfCards(grandParents));
    tree.appendChild(connector());
  }

  if(parents.length){
    tree.appendChild(label("Föräldrar"));
    tree.appendChild(rowOfCards(parents));
    tree.appendChild(connector());
  }

  tree.appendChild(label("Vald person"));
  tree.appendChild(rowOfCards([rootId]));

  if(spouses.length){
    tree.appendChild(label("Make / maka"));
    tree.appendChild(rowOfCards(spouses));
  }

  if(children.length){
    tree.appendChild(connector());
    tree.appendChild(label("Barn"));
    tree.appendChild(rowOfCards(children));

    // Barnbarn
    let grandChildren = [];
    for(const cid of children){
      grandChildren.push(...(store.childrenOf[cid] || []));
    }
    grandChildren = [...new Set(grandChildren)];

    if(grandChildren.length){
      tree.appendChild(connector());
      tree.appendChild(label("Barnbarn"));
      tree.appendChild(rowOfCards(grandChildren));
    }
  }
}

/* =========================================================
   Editor
========================================================= */

function openEditor(id){
  editingId = id;
  const p = store.people[id];
  if(!p) return;

  document.getElementById("editorTitle").textContent = "Redigera: " + (p.name || id);

  document.getElementById("e_name").value = p.name || "";
  document.getElementById("e_role").value = p.role || "";
  document.getElementById("e_born").value = p.born || "";
  document.getElementById("e_died").value = p.died || "";
  document.getElementById("e_bornParish").value = p.bornParish || "";
  document.getElementById("e_diedParish").value = p.diedParish || "";
  document.getElementById("e_job").value = p.job || "";
  document.getElementById("e_photoId").value = p.photoId || "";
  document.getElementById("e_history").value = p.history || "";

  renderRelationLists();
  document.getElementById("searchResults").innerHTML = "";
  document.getElementById("linkSearch").value = "";
  document.getElementById("new_name").value = "";

  document.getElementById("overlay").style.display = "block";
  document.getElementById("editor").style.display = "block";
}

function closeEditor(){
  document.getElementById("overlay").style.display = "none";
  document.getElementById("editor").style.display = "none";
  editingId = null;
}

function saveEditor(){
  if(!editingId) return;
  const p = store.people[editingId];
  if(!p) return;

  p.name = document.getElementById("e_name").value.trim();
  p.role = document.getElementById("e_role").value.trim();
  p.born = document.getElementById("e_born").value.trim();
  p.died = document.getElementById("e_died").value.trim();
  p.bornParish = document.getElementById("e_bornParish").value.trim();
  p.diedParish = document.getElementById("e_diedParish").value.trim();
  p.job = document.getElementById("e_job").value.trim();
  p.photoId = document.getElementById("e_photoId").value.trim();
  p.history = document.getElementById("e_history").value;

  saveStore();
  drawGenealogy(store.currentId);
  openEditor(editingId); // uppdatera listor/titel
}

function makeCurrentRoot(){
  if(!editingId) return;
  store.currentId = editingId;
  saveStore();
  drawGenealogy(editingId);
}

/* =========================================================
   Visa relationer + exakt borttagning
========================================================= */

function renderRelationLists(){
  if(!editingId) return;

  const parents = sortIdsByName(store.parentsOf[editingId] || []);
  const children = sortIdsByName(store.childrenOf[editingId] || []);
  const spouses = sortIdsByName(store.spousesOf[editingId] || []);

  const pDiv = document.getElementById("parentsList");
  const cDiv = document.getElementById("childrenList");
  const sDiv = document.getElementById("spousesList");

  pDiv.innerHTML = "";
  cDiv.innerHTML = "";
  sDiv.innerHTML = "";

  parents.forEach(pid=>{
    const d = document.createElement("div");
    d.className = "relItem";
    d.innerHTML = `
      <span>${getName(pid)}</span>
      <span>
        <button class="smallBtn" onclick="jumpToPerson('${pid}')">Gå till</button>
        <button class="smallBtn" onclick="removeParentExact('${pid}')">Ta bort</button>
      </span>
    `;
    pDiv.appendChild(d);
  });

  children.forEach(cid=>{
    const d = document.createElement("div");
    d.className = "relItem";
    d.innerHTML = `
      <span>${getName(cid)}</span>
      <span>
        <button class="smallBtn" onclick="jumpToPerson('${cid}')">Gå till</button>
        <button class="smallBtn" onclick="removeChildExact('${cid}')">Ta bort</button>
      </span>
    `;
    cDiv.appendChild(d);
  });

  spouses.forEach(sid=>{
    const d = document.createElement("div");
    d.className = "relItem";
    d.innerHTML = `
      <span>${getName(sid)}</span>
      <span>
        <button class="smallBtn" onclick="jumpToPerson('${sid}')">Gå till</button>
        <button class="smallBtn" onclick="removeSpouseExact('${sid}')">Ta bort</button>
      </span>
    `;
    sDiv.appendChild(d);
  });
}

function removeParentExact(parentId){
  if(!editingId) return;
  if(!confirm("Ta bort " + getName(parentId) + " som förälder till " + getName(editingId) + "?")) return;

  unlinkParent(editingId, parentId);
  drawGenealogy(store.currentId);
  openEditor(editingId);
}

function removeChildExact(childId){
  if(!editingId) return;
  if(!confirm("Ta bort " + getName(childId) + " som barn till " + getName(editingId) + "?")) return;

  unlinkChild(editingId, childId);
  drawGenealogy(store.currentId);
  openEditor(editingId);
}

function removeSpouseExact(spouseId){
  if(!editingId) return;
  if(!confirm("Ta bort " + getName(spouseId) + " som make/maka till " + getName(editingId) + "?")) return;

  unlinkSpouse(editingId, spouseId);
  drawGenealogy(store.currentId);
  openEditor(editingId);
}

function jumpToPerson(id){
  store.currentId = id;
  saveStore();
  drawGenealogy(id);
  openEditor(id);
}

/* =========================================================
   Sök och koppla befintlig person
========================================================= */

function searchExisting(){
  if(!editingId) return;
  const q = document.getElementById("linkSearch").value.trim().toLowerCase();
  const type = document.getElementById("linkType").value;
  const out = document.getElementById("searchResults");
  out.innerHTML = "";

  if(q.length < 1) return;

  const ids = Object.keys(store.people)
    .filter(id => id !== editingId)
    .filter(id => (store.people[id].name || "").toLowerCase().includes(q))
    .sort((a,b)=>getName(a).localeCompare(getName(b), "sv"))
    .slice(0, 30);

  ids.forEach(id=>{
    const d = document.createElement("div");
    d.className = "searchItem";
    d.innerHTML = `
      <span>${getName(id)} <span class="subline">(${store.people[id].born || ""})</span></span>
      <button class="smallBtn" onclick="linkExisting('${id}','${type}')">Koppla</button>
    `;
    out.appendChild(d);
  });

  if(ids.length === 0){
    out.innerHTML = "<div class='hint'>Ingen träff.</div>";
  }
}

function linkExisting(otherId, type){
  if(!editingId) return;

  if(type === "parent"){
    linkParent(editingId, otherId);
  }else if(type === "child"){
    linkChild(editingId, otherId);
  }else if(type === "spouse"){
    linkSpouse(editingId, otherId);
  }

  drawGenealogy(store.currentId);
  openEditor(editingId);
}

/* =========================================================
   Skapa ny person + koppla
========================================================= */

function createAndLink(){
  if(!editingId) return;
  const name = document.getElementById("new_name").value.trim();
  const type = document.getElementById("newRelType").value;

  if(!name){
    alert("Skriv namn först.");
    return;
  }

  const id = generateId();
  store.people[id] = {
    id,
    name,
    role: "",
    born: "",
    bornParish: "",
    died: "",
    diedParish: "",
    job: "",
    link: "",
    photoId: "",
    history: ""
  };

  if(type === "parent"){
    linkParent(editingId, id);
  }else if(type === "child"){
    linkChild(editingId, id);
  }else if(type === "spouse"){
    linkSpouse(editingId, id);
  }

  saveStore();
  drawGenealogy(store.currentId);
  openEditor(id); // öppna nya personen direkt
}

/* =========================================================
   Ta bort person
========================================================= */

function deleteCurrentPerson(){
  if(!editingId) return;
  const name = getName(editingId);

  if(!confirm("Ta bort personen " + name + " helt ur registret?")) return;

  // Ta bort från parentsOf (som barn)
  delete store.parentsOf[editingId];

  // Ta bort som förälder hos alla barn
  for(const childId of Object.keys(store.parentsOf)){
    removeFromArray(store.parentsOf[childId], editingId);
    if(store.parentsOf[childId].length === 0) delete store.parentsOf[childId];
  }

  // Ta bort make/maka-kopplingar
  for(const id of Object.keys(store.spousesOf)){
    removeFromArray(store.spousesOf[id], editingId);
    if(store.spousesOf[id].length === 0) delete store.spousesOf[id];
  }
  delete store.spousesOf[editingId];

  // Ta bort personen
  delete store.people[editingId];

  rebuildChildren();

  if(store.currentId === editingId){
    store.currentId = findBestRoot();
  }

  saveStore();
  closeEditor();
  drawGenealogy(store.currentId);
}

/* =========================================================
   Export
========================================================= */

function exportJSON(){
  const blob = new Blob([JSON.stringify(store, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "slaktdata_export.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

/* =========================================================
   Init
========================================================= */

(async function initApp(){
  console.log("INIT start");

  const hadLocal = loadStore();

  if(hadLocal){
    normalizeStore();
    rebuildChildren();
    ensureSpousesSymmetry();
    store.currentId ||= findBestRoot();
    saveStore();
    drawGenealogy(store.currentId);
    console.log("Laddat från localStorage:", Object.keys(store.people).length, "personer");
  }else{
    const ok = await loadFromServer(true);
    if(!ok){
      alert("Ingen data kunde laddas. Kontrollera att data/slaktdata.json finns.");
    }
  }

  console.log("INIT klar:", Object.keys(store.people).length, "personer");
})();
</script>

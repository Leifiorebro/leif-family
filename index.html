<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Leifs Släktprogram – Version 4</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
  :root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --line:#c7d2e3;
    --text:#1f2937;
    --muted:#6b7280;
    --accent:#2563eb;
    --accent2:#1d4ed8;
    --ok:#15803d;
    --warn:#b45309;
    --danger:#b91c1c;
    --card:#ffffff;
    --shadow:0 6px 18px rgba(0,0,0,.08);
    --radius:14px;
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    background:linear-gradient(90deg,#1e3a8a,#2563eb);
    color:#fff;
    padding:14px 18px;
    box-shadow:var(--shadow);
  }

  header h1{
    margin:0;
    font-size:24px;
  }

  .topbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    padding:12px 16px;
    background:#eef3ff;
    border-bottom:1px solid #dbe4ff;
  }

  .topbar input[type="text"],
  .topbar select,
  .topbar button{
    font-size:14px;
    padding:8px 10px;
    border-radius:10px;
    border:1px solid #cbd5e1;
  }

  .topbar button{
    cursor:pointer;
    background:#fff;
  }

  .topbar button:hover{
    background:#f8fafc;
  }

  .btn-primary{
    background:var(--accent)!important;
    color:#fff;
    border-color:var(--accent)!important;
  }

  .btn-primary:hover{
    background:var(--accent2)!important;
  }

  .btn-ok{
    background:var(--ok)!important;
    color:#fff;
    border-color:var(--ok)!important;
  }

  .btn-warn{
    background:var(--warn)!important;
    color:#fff;
    border-color:var(--warn)!important;
  }

  .btn-danger{
    background:var(--danger)!important;
    color:#fff;
    border-color:var(--danger)!important;
  }

  .layout{
    display:grid;
    grid-template-columns: 1fr 360px;
    gap:0;
    height:calc(100vh - 122px);
  }

  #treeWrap{
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 20%, rgba(37,99,235,.03), transparent 250px),
      radial-gradient(circle at 80% 30%, rgba(16,185,129,.03), transparent 250px),
      #f8fbff;
    border-right:1px solid #d9e3f0;
  }

  #treeSvg{
    width:100%;
    height:100%;
    display:block;
    cursor:grab;
  }

  #treeSvg:active{
    cursor:grabbing;
  }

  .side{
    background:#f8fafc;
    overflow:auto;
    padding:14px;
  }

  .panel{
    background:var(--panel);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:14px;
    margin-bottom:14px;
  }

  .panel h2{
    margin:0 0 10px 0;
    font-size:18px;
  }

  .field{
    margin-bottom:10px;
  }

  .field label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:4px;
  }

  .field input,
  .field textarea,
  .field select{
    width:100%;
    padding:8px 10px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:14px;
    background:#fff;
  }

  .field textarea{
    min-height:80px;
    resize:vertical;
  }

  .row2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .row3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
  }

  .small{
    font-size:12px;
    color:var(--muted);
  }

  .relList{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .relItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:10px;
    padding:8px 10px;
  }

  .relItem span{
    flex:1;
    font-size:14px;
  }

  .relItem button{
    padding:5px 8px;
    font-size:12px;
  }

  .personCard foreignObject > div{
    overflow:hidden;
  }

  .node-card{
    width:220px;
    height:120px;
    background:var(--card);
    border:2px solid #dbe4ff;
    border-radius:16px;
    box-shadow:0 8px 22px rgba(37,99,235,.08);
    overflow:hidden;
    display:flex;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }

  .node-card:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 26px rgba(37,99,235,.14);
    border-color:#93c5fd;
  }

  .node-current{
    border-color:#2563eb!important;
    box-shadow:0 10px 28px rgba(37,99,235,.18)!important;
  }

  .node-photo{
    width:74px;
    min-width:74px;
    height:120px;
    background:#eef2ff;
    border-right:1px solid #dbe4ff;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .node-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .node-info{
    flex:1;
    padding:8px 10px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .node-name{
    font-weight:bold;
    font-size:15px;
    line-height:1.2;
  }

  .node-dates{
    font-size:12px;
    color:var(--muted);
  }

  .node-job{
    font-size:12px;
    color:#334155;
    line-height:1.2;
    margin-top:auto;
  }

  .legend{
    font-size:12px;
    color:var(--muted);
    margin-top:8px;
  }

  .status{
    font-size:12px;
    color:#334155;
    background:#eff6ff;
    border:1px solid #bfdbfe;
    padding:8px 10px;
    border-radius:10px;
  }

  .miniBtns{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:8px;
  }

  .miniBtns button{
    font-size:12px;
    padding:6px 8px;
  }

  @media (max-width:1100px){
    .layout{
      grid-template-columns:1fr;
      height:auto;
    }
    #treeWrap{
      height:60vh;
      border-right:none;
      border-bottom:1px solid #d9e3f0;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Leifs Släktprogram – Version 4</h1>
</header>

<div class="topbar">
  <button id="btnReload" class="btn-primary">Ladda från data/slaktdata.json</button>
  <button id="btnExport" class="btn-ok">Exportera slaktdata.json</button>
  <button id="btnAddNew">Ny person</button>

  <input id="searchInput" type="text" placeholder="Sök person..." />
  <select id="searchSelect">
    <option value="">-- välj person --</option>
  </select>
  <button id="btnGo">Visa person</button>

  <button id="btnZoomIn">Zoom +</button>
  <button id="btnZoomOut">Zoom -</button>
  <button id="btnResetView">Återställ vy</button>
</div>

<div class="layout">
  <div id="treeWrap">
    <svg id="treeSvg"></svg>
  </div>

  <div class="side">
    <div class="panel">
      <h2>Status</h2>
      <div class="status" id="statusBox">Startar...</div>
      <div class="legend">
        Klicka på en person i trädet för att göra personen till ny rot och öppna redigering.
      </div>
    </div>

    <div class="panel">
      <h2>Personeditor</h2>

      <div class="field">
        <label>Person-ID</label>
        <input id="f_id" readonly />
      </div>

      <div class="field">
        <label>Namn</label>
        <input id="f_name" />
      </div>

      <div class="field">
        <label>Roll</label>
        <input id="f_role" />
      </div>

      <div class="row2">
        <div class="field">
          <label>Född</label>
          <input id="f_born" placeholder="YYYY-MM-DD" />
        </div>
        <div class="field">
          <label>Död</label>
          <input id="f_died" placeholder="YYYY-MM-DD" />
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Födelseförsamling</label>
          <input id="f_bornParish" />
        </div>
        <div class="field">
          <label>Dödsförsamling</label>
          <input id="f_diedParish" />
        </div>
      </div>

      <div class="field">
        <label>Yrke</label>
        <input id="f_job" />
      </div>

      <div class="field">
        <label>Foto-ID (t.ex. martin.jpg)</label>
        <input id="f_photoId" />
      </div>

      <div class="field">
        <label>Länk</label>
        <input id="f_link" />
      </div>

      <div class="field">
        <label>Historik / Notering</label>
        <textarea id="f_history"></textarea>
      </div>

      <div class="miniBtns">
        <button id="btnSavePerson" class="btn-ok">Spara person</button>
        <button id="btnDeletePerson" class="btn-danger">Ta bort person</button>
        <button id="btnCenterOnPerson">Centrera i trädet</button>
      </div>
    </div>

    <div class="panel">
      <h2>Relationer</h2>

      <div class="field">
        <label>Föräldrar</label>
        <div id="parentsList" class="relList"></div>
      </div>

      <div class="field">
        <label>Barn</label>
        <div id="childrenList" class="relList"></div>
      </div>

      <div class="field">
        <label>Make / maka</label>
        <div id="spousesList" class="relList"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Koppla befintliga personer</h2>

      <div class="field">
        <label>Lägg till förälder (befintlig person)</label>
        <select id="selAddParent"></select>
      </div>
      <button id="btnAddParentLink">Koppla som förälder</button>

      <hr style="margin:14px 0;border:none;border-top:1px solid #e2e8f0">

      <div class="field">
        <label>Lägg till barn (befintlig person)</label>
        <select id="selAddChild"></select>
      </div>
      <button id="btnAddChildLink">Koppla som barn</button>

      <hr style="margin:14px 0;border:none;border-top:1px solid #e2e8f0">

      <div class="field">
        <label>Lägg till make/maka (befintlig person)</label>
        <select id="selAddSpouse"></select>
      </div>
      <button id="btnAddSpouseLink">Koppla som make/maka</button>
    </div>

    <div class="panel">
      <h2>Skapa ny person och koppla direkt</h2>

      <div class="field">
        <label>Namn</label>
        <input id="new_name" placeholder="Namn på ny person" />
      </div>

      <div class="field">
        <label>Relation till vald person</label>
        <select id="new_relationType">
          <option value="none">Bara skapa person</option>
          <option value="parent">Skapa som förälder</option>
          <option value="child">Skapa som barn</option>
          <option value="spouse">Skapa som make/maka</option>
        </select>
      </div>

      <button id="btnCreateLinkedPerson" class="btn-primary">Skapa ny person</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   GLOBAL STORE
   ============================================================ */
const store = {
  people: {},
  parentsOf: {},
  childrenOf: {},
  spousesOf: {},
  currentId: null
};

let svg, gMain, gLinks, gNodes, zoomBehavior;
let lastTreeData = null;
let nodeMap = new Map();

/* ============================================================
   HJÄLPFUNKTIONER
   ============================================================ */
function setStatus(msg){
  const el = document.getElementById("statusBox");
  if(el) el.textContent = msg;
  console.log(msg);
}

function ensureStoreShape(){
  store.people ||= {};
  store.parentsOf ||= {};
  store.childrenOf ||= {};
  store.spousesOf ||= {};
}

function safeArray(v){
  return Array.isArray(v) ? v : [];
}

function uniquePush(arr, value){
  if(!arr.includes(value)) arr.push(value);
}

function removeFromArray(arr, value){
  const i = arr.indexOf(value);
  if(i >= 0) arr.splice(i, 1);
}

function newId(){
  return "p_" + Math.random().toString(36).slice(2, 11);
}

function personName(id){
  return store.people[id]?.name || id;
}

function byNameSort(a,b){
  const na = (store.people[a]?.name || "").toLowerCase();
  const nb = (store.people[b]?.name || "").toLowerCase();
  return na.localeCompare(nb, "sv");
}

/* ============================================================
   LADDNING / EXPORT
   ============================================================ */
async function loadServerJSON(){
  try{
    setStatus("Laddar data/slaktdata.json ...");
    const url = "data/slaktdata.json";
    const res = await fetch(url + "?v=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    if(data.people){
      store.people = data.people || {};
      store.parentsOf = data.parentsOf || {};
    }else{
      // fallback om gammal platt JSON råkar laddas
      store.people = data || {};
      store.parentsOf = {};
    }

    rebuildAllRelations();
    setStatus("Laddat klart: " + Object.keys(store.people).length + " personer");
    return true;
  }catch(err){
    console.error(err);
    setStatus("Kunde inte läsa data/slaktdata.json");
    return false;
  }
}

function exportJSON(){
  const out = {
    people: store.people,
    parentsOf: store.parentsOf
  };

  const blob = new Blob(
    [JSON.stringify(out, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "slaktdata.json";
  a.click();
  URL.revokeObjectURL(a.href);

  setStatus("Exporterade slaktdata.json");
}

/* ============================================================
   RELATIONER
   ============================================================ */
function normalizeParentsOf(){
  const fixed = {};
  for(const childId of Object.keys(store.parentsOf || {})){
    if(!store.people[childId]) continue;

    let arr = safeArray(store.parentsOf[childId]).filter(pid => store.people[pid]);
    arr = [...new Set(arr)];

    if(arr.length > 0){
      fixed[childId] = arr;
    }
  }
  store.parentsOf = fixed;
}

function rebuildChildren(){
  store.childrenOf = {};
  for(const childId of Object.keys(store.parentsOf)){
    for(const pid of safeArray(store.parentsOf[childId])){
      if(!store.childrenOf[pid]) store.childrenOf[pid] = [];
      uniquePush(store.childrenOf[pid], childId);
    }
  }
}

function rebuildSpouses(){
  store.spousesOf = {};

  // Make/maka härleds automatiskt:
  // Om två personer står som föräldrar till samma barn => de blir makar
  for(const childId of Object.keys(store.parentsOf)){
    const ps = safeArray(store.parentsOf[childId]);
    if(ps.length >= 2){
      for(let i=0;i<ps.length;i++){
        for(let j=i+1;j<ps.length;j++){
          const a = ps[i], b = ps[j];
          if(!store.spousesOf[a]) store.spousesOf[a] = [];
          if(!store.spousesOf[b]) store.spousesOf[b] = [];
          uniquePush(store.spousesOf[a], b);
          uniquePush(store.spousesOf[b], a);
        }
      }
    }
  }
}

function rebuildAllRelations(){
  ensureStoreShape();
  normalizeParentsOf();
  rebuildChildren();
  rebuildSpouses();
}

function addParent(childId, parentId){
  if(!store.people[childId] || !store.people[parentId]) return;
  if(!store.parentsOf[childId]) store.parentsOf[childId] = [];
  uniquePush(store.parentsOf[childId], parentId);
  rebuildAllRelations();
}

function removeParent(childId, parentId){
  if(!store.parentsOf[childId]) return;
  removeFromArray(store.parentsOf[childId], parentId);
  if(store.parentsOf[childId].length === 0) delete store.parentsOf[childId];
  rebuildAllRelations();
}

function addChild(parentId, childId){
  addParent(childId, parentId);
}

function removeChild(parentId, childId){
  removeParent(childId, parentId);
}

function addSpouse(a, b){
  if(!store.people[a] || !store.people[b] || a === b) return;

  // Vi sparar inte spousesOf i JSON.
  // För att göra relationen beständig måste man normalt ha gemensamt barn,
  // men här lagrar vi den endast i minnet tills vidare.
  if(!store.spousesOf[a]) store.spousesOf[a] = [];
  if(!store.spousesOf[b]) store.spousesOf[b] = [];
  uniquePush(store.spousesOf[a], b);
  uniquePush(store.spousesOf[b], a);

  refreshEditor();
  drawGenealogy(store.currentId);
}

function removeSpouse(a, b){
  if(store.spousesOf[a]) removeFromArray(store.spousesOf[a], b);
  if(store.spousesOf[b]) removeFromArray(store.spousesOf[b], a);
  refreshEditor();
  drawGenealogy(store.currentId);
}

/* ============================================================
   ROTVAL
   ============================================================ */
function findBestRoot(){
  if(store.currentId && store.people[store.currentId]) return store.currentId;

  // 1) person som har barn men inga föräldrar
  const ids = Object.keys(store.people);
  for(const id of ids){
    const hasParents = safeArray(store.parentsOf[id]).length > 0;
    const hasChildren = safeArray(store.childrenOf[id]).length > 0;
    if(!hasParents && hasChildren) return id;
  }

  // 2) första person med barn
  for(const id of ids){
    if(safeArray(store.childrenOf[id]).length > 0) return id;
  }

  // 3) första person
  return ids[0] || null;
}

/* ============================================================
   GENEALOGISK DATASTRUKTUR FÖR D3
   Visar:
   - vald person
   - föräldrar ovanför
   - barn nedanför
   ============================================================ */
function buildGenealogyData(rootId){
  if(!rootId || !store.people[rootId]) return null;

  const root = {
    id: rootId,
    direction: "self",
    children: []
  };

  // föräldrar uppåt (vänster del i vårt logiska träd)
  const parents = safeArray(store.parentsOf[rootId]).map(pid => ({
    id: pid,
    direction: "parent",
    children: safeArray(store.parentsOf[pid]).map(gpid => ({
      id: gpid,
      direction: "grandparent",
      children: []
    }))
  }));

  // barn nedåt
  const children = safeArray(store.childrenOf[rootId]).map(cid => ({
    id: cid,
    direction: "child",
    children: safeArray(store.childrenOf[cid]).map(gcid => ({
      id: gcid,
      direction: "grandchild",
      children: []
    }))
  }));

  // Vi bygger en "konstgjord" toppnod så att vi kan få en snygg symmetri
  return {
    id: "__ROOT__",
    hidden: true,
    children: [
      {
        id: "__PARENTS__",
        hidden: true,
        children: parents
      },
      {
        id: rootId,
        direction: "self",
        children: children
      }
    ]
  };
}

/* ============================================================
   SVG / ZOOM
   ============================================================ */
function initSvg(){
  svg = d3.select("#treeSvg");
  svg.selectAll("*").remove();

  gMain = svg.append("g");
  gLinks = gMain.append("g");
  gNodes = gMain.append("g");

  zoomBehavior = d3.zoom()
    .scaleExtent([0.3, 2.2])
    .on("zoom", (event) => {
      gMain.attr("transform", event.transform);
    });

  svg.call(zoomBehavior);

  const wrap = document.getElementById("treeWrap");
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  svg.call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(w/2 - 120, h/2 - 40).scale(0.8)
  );
}

function zoomBy(factor){
  svg.transition().duration(200).call(zoomBehavior.scaleBy, factor);
}

function resetView(){
  const wrap = document.getElementById("treeWrap");
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  svg.transition().duration(300).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(w/2 - 120, h/2 - 40).scale(0.8)
  );
}

/* ============================================================
   RITA TRÄD
   ============================================================ */
function drawGenealogy(rootId){
  if(!rootId || !store.people[rootId]) return;

  store.currentId = rootId;
  refreshEditor();

  const data = buildGenealogyData(rootId);
  lastTreeData = data;
  nodeMap.clear();

  gLinks.selectAll("*").remove();
  gNodes.selectAll("*").remove();

  const root = d3.hierarchy(data);
  const tree = d3.tree().nodeSize([180, 280]);
  tree(root);

  // specialjustering:
  // lägg föräldragren ovanför och person+barn nedanför
  const nodes = root.descendants();

  nodes.forEach(d => {
    if(d.data.id === "__PARENTS__"){
      d.x -= 180;
      d.y -= 280;
    }
    if(d.data.direction === "parent") d.y -= 240;
    if(d.data.direction === "grandparent") d.y -= 480;

    if(d.data.direction === "self") d.y += 0;
    if(d.data.direction === "child") d.y += 240;
    if(d.data.direction === "grandchild") d.y += 480;
  });

  // länkar
  const linkGen = d3.linkVertical()
    .x(d => d.x)
    .y(d => d.y);

  gLinks.selectAll("path")
    .data(root.links().filter(l => !l.source.data.hidden && !l.target.data.hidden))
    .enter()
    .append("path")
    .attr("d", linkGen)
    .attr("fill", "none")
    .attr("stroke", "#94a3b8")
    .attr("stroke-width", 2.2);

  // noder
  const visibleNodes = nodes.filter(d => !d.data.hidden);

  const node = gNodes.selectAll("g.node")
    .data(visibleNodes, d => d.data.id)
    .enter()
    .append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${d.x - 110}, ${d.y - 60})`);

  node.each(function(d){
    nodeMap.set(d.data.id, d);
  });

  node.append("foreignObject")
    .attr("width", 220)
    .attr("height", 120)
    .html(d => renderNodeCardHTML(d.data.id))
    .on("click", function(event, d){
      event.stopPropagation();
      openEditor(d.data.id);
      drawGenealogy(d.data.id);
    });

  setStatus(
    "Visar: " + personName(rootId) +
    " | Personer: " + Object.keys(store.people).length
  );
}

function renderNodeCardHTML(id){
  const p = store.people[id];
  if(!p) return "<div>Okänd</div>";

  const isCurrent = id === store.currentId;
  const cls = "node-card" + (isCurrent ? " node-current" : "");

  // DIN önskade bildlogik:
  // Om photoId finns används den, annars fallback på images/<id>.jpg
  let img = "images/default.jpg";
  if(p.photoId && p.photoId.trim()){
    img = "images/" + p.photoId.trim();
  }else{
    img = "images/" + id + ".jpg";
  }

  const born = p.born || "";
  const died = p.died || "";
  const job = p.job || "";

  return `
    <div xmlns="http://www.w3.org/1999/xhtml" class="${cls}">
      <div class="node-photo">
        <img src="${img}" onerror="this.src='images/default.jpg'">
      </div>
      <div class="node-info">
        <div class="node-name">${escapeHtml(p.name || "")}</div>
        <div class="node-dates">${escapeHtml(born)} - ${escapeHtml(died)}</div>
        <div class="node-job">${escapeHtml(job)}</div>
      </div>
    </div>
  `;
}

function escapeHtml(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

/* ============================================================
   EDITOR
   ============================================================ */
function openEditor(id){
  if(!store.people[id]) return;
  store.currentId = id;
  refreshEditor();
}

function refreshEditor(){
  const id = store.currentId;
  const p = store.people[id];
  if(!p) return;

  document.getElementById("f_id").value = id;
  document.getElementById("f_name").value = p.name || "";
  document.getElementById("f_role").value = p.role || "";
  document.getElementById("f_born").value = p.born || "";
  document.getElementById("f_died").value = p.died || "";
  document.getElementById("f_bornParish").value = p.bornParish || "";
  document.getElementById("f_diedParish").value = p.diedParish || "";
  document.getElementById("f_job").value = p.job || "";
  document.getElementById("f_photoId").value = p.photoId || "";
  document.getElementById("f_link").value = p.link || "";
  document.getElementById("f_history").value = p.history || "";

  renderRelations();
  fillAllPersonSelects();
}

function saveCurrentPerson(){
  const id = store.currentId;
  const p = store.people[id];
  if(!p) return;

  p.name = document.getElementById("f_name").value.trim();
  p.role = document.getElementById("f_role").value.trim();
  p.born = document.getElementById("f_born").value.trim();
  p.died = document.getElementById("f_died").value.trim();
  p.bornParish = document.getElementById("f_bornParish").value.trim();
  p.diedParish = document.getElementById("f_diedParish").value.trim();
  p.job = document.getElementById("f_job").value.trim();
  p.photoId = document.getElementById("f_photoId").value.trim();
  p.link = document.getElementById("f_link").value.trim();
  p.history = document.getElementById("f_history").value;

  refreshSearchList();
  fillAllPersonSelects();
  drawGenealogy(store.currentId);

  setStatus("Sparade: " + personName(id));
}

function deleteCurrentPerson(){
  const id = store.currentId;
  if(!id || !store.people[id]) return;

  if(!confirm("Ta bort personen '" + personName(id) + "' ?")) return;

  // ta bort från people
  delete store.people[id];

  // ta bort som barnnyckel
  delete store.parentsOf[id];

  // ta bort som förälder från alla barn
  for(const childId of Object.keys(store.parentsOf)){
    removeFromArray(store.parentsOf[childId], id);
    if(store.parentsOf[childId].length === 0){
      delete store.parentsOf[childId];
    }
  }

  rebuildAllRelations();

  store.currentId = findBestRoot();

  refreshSearchList();
  fillAllPersonSelects();

  if(store.currentId){
    openEditor(store.currentId);
    drawGenealogy(store.currentId);
  }else{
    setStatus("Alla personer borttagna");
  }
}

/* ============================================================
   RELATIONSLISTOR I SIDOPANEL
   ============================================================ */
function renderRelations(){
  const id = store.currentId;
  if(!id) return;

  const parentsEl = document.getElementById("parentsList");
  const childrenEl = document.getElementById("childrenList");
  const spousesEl = document.getElementById("spousesList");

  parentsEl.innerHTML = "";
  childrenEl.innerHTML = "";
  spousesEl.innerHTML = "";

  const parents = safeArray(store.parentsOf[id]).slice().sort(byNameSort);
  const children = safeArray(store.childrenOf[id]).slice().sort(byNameSort);
  const spouses = safeArray(store.spousesOf[id]).slice().sort(byNameSort);

  if(parents.length === 0){
    parentsEl.innerHTML = `<div class="small">Inga föräldrar registrerade</div>`;
  }else{
    parents.forEach(pid => parentsEl.appendChild(makeRelItem(pid, () => {
      removeParent(id, pid);
      refreshEditor();
      drawGenealogy(store.currentId);
    })));
  }

  if(children.length === 0){
    childrenEl.innerHTML = `<div class="small">Inga barn registrerade</div>`;
  }else{
    children.forEach(cid => childrenEl.appendChild(makeRelItem(cid, () => {
      removeChild(id, cid);
      refreshEditor();
      drawGenealogy(store.currentId);
    })));
  }

  if(spouses.length === 0){
    spousesEl.innerHTML = `<div class="small">Inga makar registrerade</div>`;
  }else{
    spouses.forEach(sid => spousesEl.appendChild(makeRelItem(sid, () => {
      removeSpouse(id, sid);
    }, "Ta bort")));
  }
}

function makeRelItem(otherId, onRemove, removeLabel="Ta bort"){
  const div = document.createElement("div");
  div.className = "relItem";

  const span = document.createElement("span");
  span.textContent = personName(otherId);
  span.style.cursor = "pointer";
  span.onclick = () => {
    openEditor(otherId);
    drawGenealogy(otherId);
  };

  const btn = document.createElement("button");
  btn.textContent = removeLabel;
  btn.className = "btn-danger";
  btn.onclick = onRemove;

  div.appendChild(span);
  div.appendChild(btn);
  return div;
}

/* ============================================================
   SÖK / SELECTS
   ============================================================ */
function refreshSearchList(){
  const sel = document.getElementById("searchSelect");
  sel.innerHTML = `<option value="">-- välj person --</option>`;

  const ids = Object.keys(store.people).sort(byNameSort);
  for(const id of ids){
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = `${store.people[id].name || "(utan namn)"} [${id}]`;
    sel.appendChild(opt);
  }
}

function fillAllPersonSelects(){
  fillPersonSelect("selAddParent", store.currentId);
  fillPersonSelect("selAddChild", store.currentId);
  fillPersonSelect("selAddSpouse", store.currentId);
}

function fillPersonSelect(selectId, excludeId){
  const sel = document.getElementById(selectId);
  sel.innerHTML = `<option value="">-- välj person --</option>`;

  const ids = Object.keys(store.people).filter(id => id !== excludeId).sort(byNameSort);
  for(const id of ids){
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = `${store.people[id].name || "(utan namn)"} [${id}]`;
    sel.appendChild(opt);
  }
}

function searchByText(){
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  if(!q) return;

  const hit = Object.keys(store.people).find(id => {
    const p = store.people[id];
    return (p.name || "").toLowerCase().includes(q);
  });

  if(hit){
    openEditor(hit);
    drawGenealogy(hit);
    document.getElementById("searchSelect").value = hit;
  }else{
    alert("Ingen person hittades.");
  }
}

/* ============================================================
   SKAPA PERSONER
   ============================================================ */
function createEmptyPerson(name="Ny person"){
  const id = newId();
  store.people[id] = {
    id,
    name,
    role: "",
    born: "",
    bornParish: "",
    died: "",
    diedParish: "",
    job: "",
    link: "",
    photoId: "",
    history: ""
  };
  return id;
}

function createNewStandalonePerson(){
  const id = createEmptyPerson("Ny person");
  rebuildAllRelations();
  refreshSearchList();
  fillAllPersonSelects();
  openEditor(id);
  drawGenealogy(id);
  setStatus("Ny person skapad");
}

function createLinkedPerson(){
  const currentId = store.currentId;
  if(!currentId || !store.people[currentId]) return;

  const name = document.getElementById("new_name").value.trim() || "Ny person";
  const rel = document.getElementById("new_relationType").value;

  const newPersonId = createEmptyPerson(name);

  if(rel === "parent"){
    addParent(currentId, newPersonId);
  }else if(rel === "child"){
    addChild(currentId, newPersonId);
  }else if(rel === "spouse"){
    addSpouse(currentId, newPersonId);
  }else{
    rebuildAllRelations();
  }

  refreshSearchList();
  fillAllPersonSelects();
  openEditor(newPersonId);
  drawGenealogy(newPersonId);
  document.getElementById("new_name").value = "";
}

/* ============================================================
   KOPPLA BEFINTLIGA PERSONER
   ============================================================ */
function linkExistingParent(){
  const childId = store.currentId;
  const parentId = document.getElementById("selAddParent").value;
  if(!childId || !parentId) return;
  addParent(childId, parentId);
  refreshEditor();
  drawGenealogy(store.currentId);
}

function linkExistingChild(){
  const parentId = store.currentId;
  const childId = document.getElementById("selAddChild").value;
  if(!parentId || !childId) return;
  addChild(parentId, childId);
  refreshEditor();
  drawGenealogy(store.currentId);
}

function linkExistingSpouse(){
  const a = store.currentId;
  const b = document.getElementById("selAddSpouse").value;
  if(!a || !b) return;
  addSpouse(a, b);
  refreshEditor();
  drawGenealogy(store.currentId);
}

/* ============================================================
   CENTRERA PÅ PERSON
   ============================================================ */
function centerOnPerson(id){
  const d = nodeMap.get(id);
  if(!d) return;

  const wrap = document.getElementById("treeWrap");
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  const transform = d3.zoomTransform(svg.node());
  const scale = transform.k || 0.8;

  const targetX = w / 2 - d.x * scale;
  const targetY = h / 2 - d.y * scale;

  svg.transition().duration(400).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(targetX, targetY).scale(scale)
  );
}

/* ============================================================
   EVENTS
   ============================================================ */
function wireEvents(){
  document.getElementById("btnReload").onclick = async () => {
    const ok = await loadServerJSON();
    if(!ok) return;

    refreshSearchList();
    fillAllPersonSelects();

    store.currentId = findBestRoot();
    if(store.currentId){
      openEditor(store.currentId);
      drawGenealogy(store.currentId);
      resetView();
    }
  };

  document.getElementById("btnExport").onclick = exportJSON;
  document.getElementById("btnAddNew").onclick = createNewStandalonePerson;

  document.getElementById("btnSavePerson").onclick = saveCurrentPerson;
  document.getElementById("btnDeletePerson").onclick = deleteCurrentPerson;
  document.getElementById("btnCenterOnPerson").onclick = () => centerOnPerson(store.currentId);

  document.getElementById("btnGo").onclick = () => {
    const id = document.getElementById("searchSelect").value;
    if(id && store.people[id]){
      openEditor(id);
      drawGenealogy(id);
    }else{
      searchByText();
    }
  };

  document.getElementById("searchInput").addEventListener("keydown", (e) => {
    if(e.key === "Enter") searchByText();
  });

  document.getElementById("btnAddParentLink").onclick = linkExistingParent;
  document.getElementById("btnAddChildLink").onclick = linkExistingChild;
  document.getElementById("btnAddSpouseLink").onclick = linkExistingSpouse;

  document.getElementById("btnCreateLinkedPerson").onclick = createLinkedPerson;

  document.getElementById("btnZoomIn").onclick = () => zoomBy(1.2);
  document.getElementById("btnZoomOut").onclick = () => zoomBy(0.85);
  document.getElementById("btnResetView").onclick = resetView;

  window.addEventListener("resize", () => {
    initSvg();
    if(store.currentId) drawGenealogy(store.currentId);
  });
}

/* ============================================================
   INIT
   ============================================================ */
(async function initApp(){
  console.log("INDEX STARTAR");
  ensureStoreShape();
  initSvg();
  wireEvents();

  const ok = await loadServerJSON();

  if(!ok){
    // fallback: minimal demo
    const p1 = createEmptyPerson("Israel Grek");
    const p2 = createEmptyPerson("Julius Lindahl");
    const p3 = createEmptyPerson("Martin Lindahl");
    const p4 = createEmptyPerson("Leif Lindahl");

    addParent(p2, p1);
    addParent(p3, p2);
    addParent(p4, p3);

    store.people[p1].born = "1845-09-30";
    store.people[p2].born = "1878-12-24";
    store.people[p3].born = "1905-07-18";
    store.people[p4].born = "1943-09-10";
  }

  rebuildAllRelations();
  refreshSearchList();
  fillAllPersonSelects();

  store.currentId = findBestRoot();

  if(store.currentId){
    openEditor(store.currentId);
    drawGenealogy(store.currentId);
  }

  setStatus("INIT klar: " + Object.keys(store.people).length + " personer");
})();
</script>

<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Familjeträd</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:white;
padding:10px;
display:flex;
gap:10px;
border-bottom:1px solid #ccc;
}

#tree{
width:100%;
height:90vh;
background:white;
}

.node rect{
fill:white;
stroke:#333;
stroke-width:2;
rx:8;
}

.node text{
font-size:13px;
}

.link{
fill:none;
stroke:#777;
stroke-width:2;
}

.partner{
stroke:#999;
stroke-width:3;
}

</style>
</head>

<body>

<header>

<button onclick="addPerson()">➕ Person</button>

<button onclick="exportJSON()">💾 Export</button>

<input type="file" id="importFile" hidden>

<button onclick="document.getElementById('importFile').click()">📂 Import</button>

</header>

<svg id="tree"></svg>

<script>

/* =========================
DATA STORE
========================= */

let store={
people:{},
parentsOf:{},
spousesOf:{},
root:null
}

/* =========================
UTILS
========================= */

function uid(){
return "p_"+Math.random().toString(36).substr(2,9)
}

function childrenOf(pid){

const arr=[]

Object.entries(store.parentsOf).forEach(([cid,parents])=>{
if(parents.includes(pid)) arr.push(cid)
})

return arr

}

/* =========================
PERSON
========================= */

function addPerson(){

const id=uid()

store.people[id]={
id:id,
name:"Ny person"
}

if(!store.root) store.root=id

render()

}

/* =========================
TREE DATA BUILD
========================= */

function buildHierarchy(id){

const p=store.people[id]

if(!p) return null

return{
id:id,
name:p.name,
children:childrenOf(id).map(c=>buildHierarchy(c))
}

}

/* =========================
DRAW TREE
========================= */

function render(){

const svg=d3.select("#tree")

svg.selectAll("*").remove()

if(!store.root) return

const width=window.innerWidth
const height=window.innerHeight

const g=svg.append("g")

svg.call(
d3.zoom().on("zoom",e=>{
g.attr("transform",e.transform)
})
)

const root=d3.hierarchy(buildHierarchy(store.root))

const tree=d3.tree().nodeSize([140,160])

tree(root)

/* LINKS */

g.selectAll(".link")
.data(root.links())
.enter()
.append("path")
.attr("class","link")
.attr("d",d3.linkVertical()
.x(d=>d.x)
.y(d=>d.y)
)

/* NODES */

const node=g.selectAll(".node")
.data(root.descendants())
.enter()
.append("g")
.attr("class","node")
.attr("transform",d=>"translate("+d.x+","+d.y+")")
.on("click",(e,d)=>openEditor(d.data.id))

node.append("rect")
.attr("x",-70)
.attr("y",-30)
.attr("width",140)
.attr("height",60)

node.append("text")
.attr("text-anchor","middle")
.attr("dy","-5")
.text(d=>d.data.name)

node.append("text")
.attr("text-anchor","middle")
.attr("dy","15")
.text(d=>{
const p=store.people[d.data.id]
return (p.born||"")+"-"+(p.died||"")
})

}

/* =========================
EDITOR (minimal)
========================= */

function openEditor(id){

const p=store.people[id]

const name=prompt("Namn:",p.name)

if(name!==null){
p.name=name
render()
}

}

/* =========================
JSON
========================= */

function exportJSON(){

const blob=new Blob(
[JSON.stringify(store,null,2)],
{type:"application/json"}
)

const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="slaktdata.json"
a.click()

}

document.getElementById("importFile").addEventListener("change",async e=>{

const file=e.target.files[0]
if(!file) return

const text=await file.text()

store=JSON.parse(text)

render()

})

/* =========================
START
========================= */

render()

</script>

</body>
</html>

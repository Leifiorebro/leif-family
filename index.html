<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Familjeträd</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:white;
padding:10px;
display:flex;
gap:10px;
border-bottom:1px solid #ccc;
}

#tree{
padding:40px;
display:flex;
flex-direction:column;
align-items:center;
gap:80px;
}

.row{
display:flex;
gap:40px;
justify-content:center;
flex-wrap:wrap;
}

.card{
width:200px;
height:230px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
cursor:pointer;
display:flex;
flex-direction:column;
overflow:hidden;
}

.card.current{
outline:4px solid #2ecc71;
}

.cardHeader{
background:#3498db;
color:white;
padding:6px;
text-align:center;
font-weight:bold;
}

.photo{
height:120px;
background:#eee;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
padding:10px;
font-size:14px;
text-align:center;
}

#editor{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:white;
border-left:1px solid #ccc;
padding:15px;
overflow:auto;
}

input,select{
width:100%;
margin-bottom:8px;
}

button{
padding:6px 10px;
}

.listItem{
display:flex;
justify-content:space-between;
margin-bottom:4px;
}

</style>
</head>

<body>

<header>

<button onclick="addPerson()">➕ Person</button>

<button onclick="exportJSON()">💾 Export</button>

<input type="file" id="importFile" hidden>
<button onclick="document.getElementById('importFile').click()">📂 Import</button>

</header>

<div id="tree"></div>

<div id="editor">

<h3 id="editTitle">Ingen vald</h3>

<label>Namn</label>
<input id="e_name">

<label>Född</label>
<input id="e_born">

<label>Död</label>
<input id="e_died">

<h4>Föräldrar</h4>

<select id="e_mother"></select>
<button onclick="removeMother()">Ta bort mor</button>

<select id="e_father"></select>
<button onclick="removeFather()">Ta bort far</button>

<h4>Partner</h4>

<div id="spouseList"></div>

<select id="existingSpouse"></select>
<button onclick="linkExistingSpouse()">Lägg till befintlig</button>

<button onclick="addSpouse()">+ ny partner</button>

<h4>Barn</h4>

<div id="childList"></div>

<select id="existingChild"></select>
<button onclick="linkExistingChild()">Lägg till befintligt barn</button>

<button onclick="addChild()">+ nytt barn</button>

<hr>

<button onclick="savePerson()">💾 Spara</button>
<button onclick="deletePerson()">🗑 Ta bort</button>

</div>

<script>

/* ========================
STORE
======================== */

let store={
people:{},
parentsOf:{},
spousesOf:{},
currentId:null
}

/* ========================
UTILS
======================== */

function uid(){
return "p_"+Math.random().toString(36).substr(2,9)
}

function sortedPeople(){
return Object.values(store.people)
.sort((a,b)=>(a.name||"").localeCompare(b.name||"","sv"))
}

function childrenOf(pid){

const arr=[]

Object.entries(store.parentsOf).forEach(([cid,parents])=>{
if(parents.includes(pid)) arr.push(cid)
})

return arr
}

/* ========================
PERSON
======================== */

function addPerson(){

const id=uid()

store.people[id]={id,name:"Ny person"}

store.currentId=id

render()
openEditor(id)
}

function deletePerson(){

const id=store.currentId
if(!id) return

delete store.people[id]
delete store.parentsOf[id]
delete store.spousesOf[id]

Object.keys(store.parentsOf).forEach(c=>{
store.parentsOf[c]=store.parentsOf[c].filter(p=>p!==id)
})

render()
}

/* ========================
RELATIONS
======================== */

function addChild(){

const pid=store.currentId
if(!pid) return

const id=uid()

store.people[id]={id,name:"Barn"}

store.parentsOf[id]=[pid]

render()
}

function addSpouse(){

const pid=store.currentId

const id=uid()

store.people[id]={id,name:"Partner"}

store.spousesOf[pid] ||= []
store.spousesOf[id] ||= []

store.spousesOf[pid].push(id)
store.spousesOf[id].push(pid)

render()
}

function linkExistingSpouse(){

const pid=store.currentId
const sid=document.getElementById("existingSpouse").value

if(!sid) return

store.spousesOf[pid] ||= []
store.spousesOf[sid] ||= []

if(!store.spousesOf[pid].includes(sid))
store.spousesOf[pid].push(sid)

if(!store.spousesOf[sid].includes(pid))
store.spousesOf[sid].push(pid)

render()
}

function linkExistingChild(){

const pid=store.currentId
const cid=document.getElementById("existingChild").value

if(!cid) return

store.parentsOf[cid] ||= []

if(!store.parentsOf[cid].includes(pid))
store.parentsOf[cid].push(pid)

render()
}

function removeMother(){

const id=store.currentId
if(!store.parentsOf[id]) return

store.parentsOf[id][0]=null

render()
}

function removeFather(){

const id=store.currentId
if(!store.parentsOf[id]) return

store.parentsOf[id][1]=null

render()
}

/* ========================
EDITOR
======================== */

function openEditor(id){

const p=store.people[id]
store.currentId=id

document.getElementById("editTitle").innerText=p.name

document.getElementById("e_name").value=p.name||""
document.getElementById("e_born").value=p.born||""
document.getElementById("e_died").value=p.died||""

buildParentSelect(id)
buildChildren(id)
buildSpouses(id)
buildSpouseSelect()
buildChildSelect()

render()
}

function buildParentSelect(id){

const m=document.getElementById("e_mother")
const f=document.getElementById("e_father")

m.innerHTML="<option value=''>Ingen</option>"
f.innerHTML="<option value=''>Ingen</option>"

sortedPeople().forEach(p=>{

if(p.id===id) return

m.add(new Option(p.name,p.id))
f.add(new Option(p.name,p.id))

})

const parents=store.parentsOf[id]||[]

m.value=parents[0]||""
f.value=parents[1]||""
}

function buildChildren(id){

const box=document.getElementById("childList")
box.innerHTML=""

childrenOf(id).forEach(cid=>{

const d=document.createElement("div")
d.className="listItem"

d.innerHTML=
store.people[cid].name+
" <button onclick='unlinkChild(\""+cid+"\")'>X</button>"

box.appendChild(d)

})
}

function buildSpouses(id){

const box=document.getElementById("spouseList")
box.innerHTML=""

;(store.spousesOf[id]||[]).forEach(sid=>{

const d=document.createElement("div")
d.className="listItem"

d.innerHTML=
store.people[sid].name+
" <button onclick='unlinkSpouse(\""+sid+"\")'>X</button>"

box.appendChild(d)

})
}

function buildSpouseSelect(){

const sel=document.getElementById("existingSpouse")
sel.innerHTML="<option value=''>Välj person</option>"

sortedPeople().forEach(p=>{
if(p.id===store.currentId) return
sel.add(new Option(p.name,p.id))
})
}

function buildChildSelect(){

const sel=document.getElementById("existingChild")
sel.innerHTML="<option value=''>Välj barn</option>"

sortedPeople().forEach(p=>{
if(p.id===store.currentId) return
sel.add(new Option(p.name,p.id))
})
}

function unlinkChild(cid){
delete store.parentsOf[cid]
render()
}

function unlinkSpouse(sid){

const id=store.currentId

store.spousesOf[id]=store.spousesOf[id].filter(x=>x!==sid)
store.spousesOf[sid]=store.spousesOf[sid].filter(x=>x!==id)

render()
}

function savePerson(){

const id=store.currentId
const p=store.people[id]

p.name=document.getElementById("e_name").value
p.born=document.getElementById("e_born").value
p.died=document.getElementById("e_died").value

const m=document.getElementById("e_mother").value
const f=document.getElementById("e_father").value

store.parentsOf[id]=[]

if(m) store.parentsOf[id][0]=m
if(f) store.parentsOf[id][1]=f

render()
}

/* ========================
TREE
======================== */

function render(){

const tree=document.getElementById("tree")
tree.innerHTML=""

const center=store.currentId || Object.keys(store.people)[0]
if(!center) return

const parents=store.parentsOf[center]||[]
const children=childrenOf(center)

/* parents */

const pRow=document.createElement("div")
pRow.className="row"

parents.forEach(pid=>{
if(store.people[pid])
pRow.appendChild(createCard(pid))
})

tree.appendChild(pRow)

/* center */

const cRow=document.createElement("div")
cRow.className="row"

cRow.appendChild(createCard(center))

;(store.spousesOf[center]||[]).forEach(pid=>{
cRow.appendChild(createCard(pid))
})

tree.appendChild(cRow)

/* children */

const chRow=document.createElement("div")
chRow.className="row"

children.forEach(cid=>{
chRow.appendChild(createCard(cid))
})

tree.appendChild(chRow)
}

function createCard(id){

const p=store.people[id]

const c=document.createElement("div")
c.className="card"

if(id===store.currentId) c.classList.add("current")

c.onclick=()=>openEditor(id)

const img="images/"+id+".jpg"

c.innerHTML=`

<div class="cardHeader">${p.name}</div>

<div class="photo">
<img src="${img}" onerror="this.src='images/default.jpg'">
</div>

<div class="info">
${p.born||""} - ${p.died||""}
</div>

`

return c
}

/* ========================
JSON
======================== */

function exportJSON(){

const blob=new Blob(
[JSON.stringify(store,null,2)],
{type:"application/json"}
)

const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="slaktdata.json"
a.click()
}

document.getElementById("importFile").addEventListener("change",async e=>{

const file=e.target.files[0]
if(!file) return

const text=await file.text()

store=JSON.parse(text)

render()

})

render()

</script>

</body>
</html>

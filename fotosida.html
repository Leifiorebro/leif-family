<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fotosida</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:#222;
}

header{
  background:white;
  border-bottom:1px solid #ddd;
  padding:14px 18px;
  position:sticky;
  top:0;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

header h1{
  margin:0;
  font-size:24px;
  color:#2c3e50;
}

.navButtons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.navButtons a,
.navButtons button{
  display:inline-block;
  padding:8px 12px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  text-decoration:none;
  color:#222;
  font-size:14px;
}

.navButtons a:hover,
.navButtons button:hover{
  background:#f0f0f0;
}

#container{
  max-width:1280px;
  margin:0 auto;
  padding:24px 16px 40px;
}

.card{
  background:white;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  overflow:hidden;
  margin-bottom:24px;
}

.hero{
  display:grid;
  grid-template-columns:minmax(280px, 420px) 1fr;
  gap:0;
}

.heroPhoto{
  background:#fff;
  border-right:1px solid #eee;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:420px;
  padding:14px;
}

.heroPhoto img{
  width:100%;
  max-width:100%;
  max-height:650px;
  object-fit:contain;
  display:block;
  background:white;
}

.heroInfo{
  padding:24px 24px 18px;
}

.heroInfo h2{
  margin:0 0 12px;
  font-size:30px;
  color:#2c3e50;
}

.meta{
  display:grid;
  grid-template-columns:170px 1fr;
  gap:8px 12px;
  margin-top:10px;
}

.metaLabel{
  font-weight:bold;
  color:#444;
}

.metaValue{
  color:#222;
}

.section{
  background:white;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  padding:18px;
  margin-bottom:22px;
}

.section h3{
  margin:0 0 14px;
  font-size:22px;
  color:#2c3e50;
}

.sectionToolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:0 0 14px;
}

.sectionToolbar button{
  padding:8px 12px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.sectionToolbar button:hover{
  background:#f0f0f0;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:16px;
}

.thumb{
  background:white;
  border:1px solid #eee;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  display:flex;
  flex-direction:column;
}

.thumb img{
  width:100%;
  height:260px;
  object-fit:contain;
  background:white;
  display:block;
}

.thumbCaptionWrap{
  border-top:1px solid #f0f0f0;
  background:#fafafa;
  padding:10px;
}

.thumbCaptionLabel{
  font-size:12px;
  font-weight:bold;
  color:#555;
  margin-bottom:6px;
}

.thumbCaption{
  width:100%;
  min-height:90px;
  max-height:140px;
  resize:vertical;
  overflow-y:auto;
  padding:10px;
  font-size:13px;
  line-height:1.45;
  border:1px solid #d8d8d8;
  border-radius:8px;
  font-family:Arial, Helvetica, sans-serif;
  background:white;
}

.thumbCaption:focus{
  outline:none;
  border-color:#6ea8d6;
  box-shadow:0 0 0 3px rgba(110,168,214,0.15);
}

.captionButtons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}

.captionButtons button{
  padding:6px 10px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.captionButtons button:hover{
  background:#f0f0f0;
}

.relGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
  gap:12px;
}

.relCard{
  border:1px solid #eee;
  border-radius:10px;
  padding:12px;
  background:#fafafa;
}

.relCard h4{
  margin:0 0 8px;
  font-size:16px;
  color:#444;
}

.relList{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.relLink{
  display:inline-block;
  text-decoration:none;
  color:#1d6fa5;
  padding:6px 8px;
  border-radius:8px;
}

.relLink:hover{
  background:#eef7fd;
}

.notice{
  background:#fff8e1;
  border:1px solid #f0d68a;
  color:#6b5500;
  padding:12px 14px;
  border-radius:10px;
}

.error{
  background:#ffecec;
  border:1px solid #f0b3b3;
  color:#8a1f1f;
  padding:12px 14px;
  border-radius:10px;
}

.success{
  background:#e9f8ec;
  border:1px solid #9ed7aa;
  color:#1f6b2a;
  padding:12px 14px;
  border-radius:10px;
}

.small{
  font-size:13px;
  color:#666;
}

.loading{
  text-align:center;
  padding:40px 10px;
  font-size:18px;
  color:#666;
}

.statusBar{
  position:sticky;
  bottom:0;
  z-index:15;
  background:#ffffffee;
  backdrop-filter:blur(6px);
  border-top:1px solid #ddd;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.statusText{
  font-size:14px;
  color:#444;
}

.statusActions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.statusActions button{
  padding:8px 12px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.statusActions button:hover{
  background:#f0f0f0;
}

@media (max-width:900px){
  .hero{
    grid-template-columns:1fr;
  }

  .heroPhoto{
    border-right:none;
    border-bottom:1px solid #eee;
    min-height:280px;
  }

  .meta{
    grid-template-columns:1fr;
  }

  .gallery{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>
  <h1>Fotosida</h1>
  <div class="navButtons">
    <a id="backToPerson" href="#">👤 Personblad</a>
    <a id="backToTree" href="index.html">🌳 Släktträd</a>
    <button onclick="reloadPage()">↻ Ladda om</button>
  </div>
</header>

<div id="container">
  <div id="messageArea"></div>
  <div id="content" class="loading">Laddar persondata...</div>
</div>

<div class="statusBar">
  <div class="statusText" id="statusText">Inga ändringar ännu.</div>
  <div class="statusActions">
    <button onclick="saveCurrentPersonCaptions()">💾 Spara bildtexter (lokalt i sidan)</button>
    <button onclick="resetCurrentPersonCaptions()">↺ Återställ denna persons bildtexter</button>
    <button onclick="downloadUpdatedJson()">⬇ Ladda ner uppdaterad slaktdata.json</button>
  </div>
</div>

<script>
/* =========================================================
   KONFIGURATION
   ========================================================= */

const DATA_PATH = "data/slaktdata.json";
const EXTRA_IMAGE_VARIANTS = 8;

/* =========================================================
   GLOBALT
   ========================================================= */

let store = null;
let originalStore = null;
let currentId = null;
let currentImageList = [];
let unsavedChanges = false;

/* =========================================================
   START
   ========================================================= */

window.addEventListener("DOMContentLoaded", init);

async function init(){
  const params = new URLSearchParams(window.location.search);
  currentId = params.get("id");

  if(!currentId){
    showError("Ingen person angiven i länken. Öppna sidan som <strong>fotosida.html?id=PERSON_ID</strong>.");
    return;
  }

  document.getElementById("backToPerson").href = "person.html?id=" + encodeURIComponent(currentId);

  try{
    const res = await fetch(DATA_PATH, { cache: "no-store" });

    if(!res.ok){
      throw new Error("Kunde inte läsa " + DATA_PATH + " (HTTP " + res.status + ")");
    }

    const data = await res.json();

    store = {
      people: data.people || {},
      parentsOf: data.parentsOf || {},
      spousesOf: data.spousesOf || {},
      currentId: data.currentId || null
    };

    originalStore = deepClone(store);

    normalizeStore();

    if(!store.people[currentId]){
      showError("Personen med id <strong>" + escapeHtml(currentId) + "</strong> hittades inte i <strong>" + escapeHtml(DATA_PATH) + "</strong>.");
      return;
    }

    await renderPersonPage(currentId);
    updateStatus("Data inläst från " + DATA_PATH + ". Redigera bildtexter direkt under bilderna.");

  }catch(err){
    console.error(err);
    showError(
      "Kunde inte läsa <strong>" + escapeHtml(DATA_PATH) + "</strong> automatiskt.<br><br>" +
      "Kontrollera att filen finns i mappen <strong>data</strong> på GitHub."
    );
  }
}

window.addEventListener("beforeunload", function(e){
  if(!unsavedChanges) return;
  e.preventDefault();
  e.returnValue = "";
});

/* =========================================================
   NORMALISERING / DATA
   ========================================================= */

function normalizeStore(){
  if(!store || typeof store !== "object"){
    store = { people:{}, parentsOf:{}, spousesOf:{}, currentId:null };
  }

  store.people = store.people || {};
  store.parentsOf = store.parentsOf || {};
  store.spousesOf = store.spousesOf || {};

  Object.keys(store.people).forEach(id=>{
    const p = store.people[id] || {};
    p.id = p.id || id;

    if(!p.birthPlace && p.birthParish) p.birthPlace = p.bornParish;
    if(!p.deathPlace && p.deathParish) p.deathPlace = p.diedParish;
    if(!p.photoCaptions || typeof p.photoCaptions !== "object"){
      p.photoCaptions = {};
    }

    store.people[id] = p;
  });

  Object.keys(store.parentsOf).forEach(cid=>{
    if(!store.people[cid]){
      delete store.parentsOf[cid];
      return;
    }

    const arr = Array.isArray(store.parentsOf[cid]) ? store.parentsOf[cid] : [];
    store.parentsOf[cid] = [
      arr[0] && store.people[arr[0]] ? arr[0] : null,
      arr[1] && store.people[arr[1]] ? arr[1] : null
    ];
  });

  const cleaned = {};
  Object.keys(store.people).forEach(id=> cleaned[id] = []);

  Object.keys(store.spousesOf).forEach(id=>{
    if(!store.people[id]) return;
    const list = Array.isArray(store.spousesOf[id]) ? store.spousesOf[id] : [];

    list.forEach(sid=>{
      if(!store.people[sid]) return;
      if(id === sid) return;

      if(!cleaned[id].includes(sid)) cleaned[id].push(sid);
      if(!cleaned[sid].includes(id)) cleaned[sid].push(id);
    });
  });

  store.spousesOf = cleaned;
}

function getPerson(id){
  return store && store.people ? store.people[id] : null;
}

function getDisplayName(id){
  const p = getPerson(id);
  return p && p.name ? p.name : "(saknas)";
}

function childrenOf(pid){
  const arr = [];

  Object.entries(store.parentsOf).forEach(([cid, parents])=>{
    if(Array.isArray(parents) && parents.includes(pid)){
      arr.push(cid);
    }
  });

  arr.sort((a,b)=>{
    const pa = getPerson(a) || {};
    const pb = getPerson(b) || {};

    const ya = extractYear(pa.born) || 9999;
    const yb = extractYear(pb.born) || 9999;

    if(ya !== yb) return ya - yb;

    return (pa.name || "").localeCompare((pb.name || ""), "sv", { sensitivity:"base" });
  });

  return arr;
}

/* =========================================================
   RENDER
   ========================================================= */

async function renderPersonPage(personId){
  const person = getPerson(personId);

  if(!person){
    showError("Personen kunde inte hittas.");
    return;
  }

  const container = document.getElementById("content");
  container.className = "";
  container.innerHTML = "";

  const imageBase = sanitizeNameForImage(person.name || "");
  currentImageList = await collectExistingImages(imageBase);

  const heroImage = currentImageList.length ? currentImageList[0] : "images/default.jpg";

  const age = calculateAge(person);
  const parents = store.parentsOf[personId] || [null, null];
  const spouses = (store.spousesOf[personId] || []).slice().sort((a,b)=>
    getDisplayName(a).localeCompare(getDisplayName(b), "sv", { sensitivity:"base" })
  );
  const kids = childrenOf(personId);

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="hero">
      <div class="heroPhoto">
        <img src="${heroImage}" alt="${escapeHtml(person.name || "")}">
      </div>
      <div class="heroInfo">
        <h2>${escapeHtml(person.name || "Namnlös person")}</h2>

        <div class="meta">
          <div class="metaLabel">ID</div>
          <div class="metaValue">${escapeHtml(person.id || personId)}</div>

          <div class="metaLabel">Född</div>
          <div class="metaValue">${escapeHtml(person.born || "-")}</div>

          <div class="metaLabel">Död</div>
          <div class="metaValue">${escapeHtml(person.died || "-")}</div>

          <div class="metaLabel">Ålder</div>
          <div class="metaValue">${escapeHtml(age || "-")}</div>

          <div class="metaLabel">Födelseförsamling</div>
          <div class="metaValue">${escapeHtml(person.birthPlace || person.bornParish || "-")}</div>

          <div class="metaLabel">Dödsförsamling</div>
          <div class="metaValue">${escapeHtml(person.deathPlace || person.diedParish || "-")}</div>

          <div class="metaLabel">Yrke</div>
          <div class="metaValue">${escapeHtml(person.job || "-")}</div>
        </div>

        <div style="margin-top:18px;" class="navButtons">
          <a href="person.html?id=${encodeURIComponent(personId)}">👤 Öppna personblad</a>
          <a href="index.html">🌳 Till släktträdet</a>
        </div>
      </div>
    </div>
  `;

  container.appendChild(card);

  renderGallerySection(container, person, imageBase);
  renderRelationsSection(container, personId, parents, spouses, kids);
  renderInfoSection(container, person, imageBase);
}

function renderGallerySection(container, person, imageBase){
  const gallerySection = document.createElement("div");
  gallerySection.className = "section";
  gallerySection.id = "gallerySection";

  const title = document.createElement("h3");
  title.textContent = "Fotogalleri";
  gallerySection.appendChild(title);

  const toolbar = document.createElement("div");
  toolbar.className = "sectionToolbar";
  toolbar.innerHTML = `
    <button onclick="saveCurrentPersonCaptions()">💾 Spara bildtexter (lokalt)</button>
    <button onclick="resetCurrentPersonCaptions()">↺ Återställ denna persons bildtexter</button>
    <button onclick="downloadUpdatedJson()">⬇ Ladda ner uppdaterad slaktdata.json</button>
  `;
  gallerySection.appendChild(toolbar);

  if(currentImageList.length){
    const grid = document.createElement("div");
    grid.className = "gallery";
    grid.id = "galleryGrid";

    currentImageList.forEach((src, index)=>{
      const box = document.createElement("div");
      box.className = "thumb";

      const captionKey = getCaptionKey(index);
      const captionValue = getPhotoCaption(person, index);

      box.innerHTML = `
        <img src="${src}" alt="${escapeHtml(person.name || "")} - bild ${index + 1}">
        <div class="thumbCaptionWrap">
          <div class="thumbCaptionLabel">
            Bild ${index + 1} — nyckel i JSON: <strong>${escapeHtml(captionKey)}</strong>
          </div>
          <textarea
            class="thumbCaption"
            id="caption_${index}"
            data-index="${index}"
            placeholder="Skriv bildtext här...&#10;Flera rader går bra."
          >${escapeHtml(captionValue)}</textarea>
          <div class="captionButtons">
            <button onclick="saveSingleCaption(${index})">Spara denna bildtext</button>
            <button onclick="clearSingleCaption(${index})">Töm</button>
          </div>
        </div>
      `;

      grid.appendChild(box);
    });

    gallerySection.appendChild(grid);
  }else{
    gallerySection.innerHTML += `
      <div class="notice">
        Inga personspecifika bilder hittades i <strong>/images</strong> för <strong>${escapeHtml(person.name || "")}</strong>.<br><br>
        Visar därför standardbild i huvudkortet.<br>
        Förslag på filnamn:
        <div class="small" style="margin-top:8px;">
          images/${escapeHtml(imageBase)}.jpg<br>
          images/${escapeHtml(imageBase)}_1.jpg<br>
          images/${escapeHtml(imageBase)}_2.jpg
        </div>
      </div>
    `;
  }

  container.appendChild(gallerySection);
}

function renderRelationsSection(container, personId, parents, spouses, kids){
  const relSection = document.createElement("div");
  relSection.className = "section";

  relSection.innerHTML = `<h3>Släktrelationer</h3>`;

  const relGrid = document.createElement("div");
  relGrid.className = "relGrid";

  relGrid.appendChild(makeRelationCard(
    "Föräldrar",
    [
      parents[0] ? relationLink(parents[0], "Far") : "<div class='small'>Far: -</div>",
      parents[1] ? relationLink(parents[1], "Mor") : "<div class='small'>Mor: -</div>"
    ]
  ));

  relGrid.appendChild(makeRelationCard(
    "Partner",
    spouses.length
      ? spouses.map(id => relationLink(id))
      : ["<div class='small'>Inga partner registrerade</div>"]
  ));

  relGrid.appendChild(makeRelationCard(
    "Barn",
    kids.length
      ? kids.map(id => relationLink(id))
      : ["<div class='small'>Inga barn registrerade</div>"]
  ));

  relSection.appendChild(relGrid);
  container.appendChild(relSection);
}

function renderInfoSection(container, person, imageBase){
  const infoSection = document.createElement("div");
  infoSection.className = "section";
  infoSection.innerHTML = `
    <h3>Bildmatchning</h3>
    <div class="small">
      Denna sida försöker automatiskt hitta bilder baserat på personens namn.<br><br>
      <strong>Namn:</strong> ${escapeHtml(person.name || "")}<br>
      <strong>Bildbas:</strong> ${escapeHtml(imageBase)}<br><br>
      Den provar bland annat:<br>
      images/${escapeHtml(imageBase)}.jpg<br>
      images/${escapeHtml(imageBase)}.jpeg<br>
      images/${escapeHtml(imageBase)}.png<br>
      images/${escapeHtml(imageBase)}_1.jpg ... _${EXTRA_IMAGE_VARIANTS}.jpg<br><br>
      <strong>Bildtext-nycklar:</strong><br>
      första bilden = <strong>main</strong><br>
      andra bilden = <strong>1</strong><br>
      tredje bilden = <strong>2</strong><br>
      fjärde bilden = <strong>3</strong> osv.
    </div>
  `;
  container.appendChild(infoSection);
}

function makeRelationCard(title, items){
  const box = document.createElement("div");
  box.className = "relCard";

  const listHtml = items.map(item => `<div>${item}</div>`).join("");

  box.innerHTML = `
    <h4>${escapeHtml(title)}</h4>
    <div class="relList">${listHtml}</div>
  `;

  return box;
}

function relationLink(id, prefix=""){
  const name = getDisplayName(id);
  const label = prefix ? (prefix + ": " + name) : name;

  return `
    <a class="relLink" href="fotosida.html?id=${encodeURIComponent(id)}">
      📷 ${escapeHtml(label)}
    </a>
    <a class="relLink small" href="person.html?id=${encodeURIComponent(id)}" style="margin-left:4px;">
      (personblad)
    </a>
  `;
}

/* =========================================================
   BILDTEXTER - REDIGERING
   ========================================================= */

function getCaptionKey(imageIndex){
  return imageIndex === 0 ? "main" : String(imageIndex);
}

function getPhotoCaption(person, imageIndex){
  const captions = person && person.photoCaptions ? person.photoCaptions : null;
  if(!captions) return "";

  const key = getCaptionKey(imageIndex);
  return captions[key] || "";
}

function ensurePhotoCaptionsObject(person){
  if(!person.photoCaptions || typeof person.photoCaptions !== "object"){
    person.photoCaptions = {};
  }
}

function saveSingleCaption(index){
  const person = getPerson(currentId);
  if(!person) return;

  ensurePhotoCaptionsObject(person);

  const textarea = document.getElementById("caption_" + index);
  if(!textarea) return;

  const key = getCaptionKey(index);
  const value = textarea.value.trim();

  if(value){
    person.photoCaptions[key] = value;
  }else{
    delete person.photoCaptions[key];
  }

  unsavedChanges = true;
  updateStatus("Bildtext sparad i minnet för " + (person.name || currentId) + ". Ladda ner JSON för permanent sparning.");
  showSuccess("Bildtext för <strong>bild " + (index + 1) + "</strong> sparad i sidan. Klicka sedan på <strong>Ladda ner uppdaterad slaktdata.json</strong>.");
}

function clearSingleCaption(index){
  const textarea = document.getElementById("caption_" + index);
  if(!textarea) return;
  textarea.value = "";
  saveSingleCaption(index);
}

function saveCurrentPersonCaptions(){
  const person = getPerson(currentId);
  if(!person) return;

  ensurePhotoCaptionsObject(person);

  for(let i = 0; i < currentImageList.length; i++){
    const textarea = document.getElementById("caption_" + i);
    if(!textarea) continue;

    const key = getCaptionKey(i);
    const value = textarea.value.trim();

    if(value){
      person.photoCaptions[key] = value;
    }else{
      delete person.photoCaptions[key];
    }
  }

  unsavedChanges = true;
  updateStatus("Alla bildtexter för aktuell person sparade i minnet. Ladda ner JSON för permanent sparning.");
  showSuccess("Alla bildtexter för <strong>" + escapeHtml(person.name || currentId) + "</strong> sparades i sidan. Klicka nu på <strong>Ladda ner uppdaterad slaktdata.json</strong>.");
}

function resetCurrentPersonCaptions(){
  if(!originalStore || !currentId) return;

  const originalPerson = originalStore.people && originalStore.people[currentId] ? originalStore.people[currentId] : null;
  const currentPerson = getPerson(currentId);

  if(!currentPerson) return;

  currentPerson.photoCaptions = deepClone((originalPerson && originalPerson.photoCaptions) ? originalPerson.photoCaptions : {});

  for(let i = 0; i < currentImageList.length; i++){
    const textarea = document.getElementById("caption_" + i);
    if(!textarea) continue;

    const key = getCaptionKey(i);
    textarea.value = currentPerson.photoCaptions[key] || "";
  }

  unsavedChanges = true;
  updateStatus("Bildtexter för aktuell person återställda till ursprungligt innehåll från inläst JSON.");
  showSuccess("Bildtexterna återställdes för aktuell person. Om du vill behålla återställningen: ladda ner uppdaterad JSON.");
}

/* =========================================================
   EXPORT / NEDLADDNING
   ========================================================= */

function downloadUpdatedJson(){
  if(!store){
    showError("Ingen data finns att ladda ner.");
    return;
  }

  saveCurrentPersonCaptions();

  const exportData = {
    people: store.people,
    parentsOf: store.parentsOf,
    spousesOf: store.spousesOf,
    currentId: store.currentId || currentId
  };

  const jsonText = JSON.stringify(exportData, null, 2);
  const blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "slaktdata.json";
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(()=> URL.revokeObjectURL(url), 1000);

  unsavedChanges = false;
  updateStatus("Uppdaterad slaktdata.json nedladdad. Ersätt data/slaktdata.json på GitHub med den nya filen.");
  showSuccess(
    "Den uppdaterade filen <strong>slaktdata.json</strong> har laddats ner.<br><br>" +
    "Nästa steg:<br>" +
    "1. Öppna din GitHub-repo<br>" +
    "2. Gå till mappen <strong>data</strong><br>" +
    "3. Ersätt filen <strong>slaktdata.json</strong> med den nedladdade versionen"
  );
}

async function collectExistingImages(baseName){
  const candidates = [];

  candidates.push("images/" + baseName + ".jpg");
  candidates.push("images/" + baseName + ".jpeg");
  candidates.push("images/" + baseName + ".png");

  for(let i = 1; i <= EXTRA_IMAGE_VARIANTS; i++){
    candidates.push("images/" + baseName + "_" + i + ".jpg");
    candidates.push("images/" + baseName + "_" + i + ".jpeg");
    candidates.push("images/" + baseName + "_" + i + ".png");
  }

  const existing = [];

  for(const src of candidates){
    const ok = await imageExists(src);
    if(ok){
      existing.push(src);
    }
  }

  return existing;
}

function imageExists(src){
  return new Promise(resolve=>{
    const img = new Image();

    img.onload = ()=> resolve(true);
    img.onerror = ()=> resolve(false);

    const separator = src.includes("?") ? "&" : "?";
    img.src = src + separator + "v=" + Date.now();
  });
}

/* =========================================================
   HJÄLPFUNKTIONER
   ========================================================= */

function sanitizeNameForImage(name){
  let filename = (name || "").toLowerCase();

  filename = filename
    .replace(/å/g,"a")
    .replace(/ä/g,"a")
    .replace(/ö/g,"o")
    .replace(/é/g,"e")
    .replace(/è/g,"e")
    .replace(/ê/g,"e")
    .replace(/ë/g,"e")
    .replace(/ü/g,"u")
    .replace(/ú/g,"u")
    .replace(/ù/g,"u")
    .replace(/û/g,"u")
    .replace(/ó/g,"o")
    .replace(/ò/g,"o")
    .replace(/ô/g,"o")
    .replace(/á/g,"a")
    .replace(/à/g,"a")
    .replace(/â/g,"a")
    .replace(/[^a-z0-9 ]/g,"")
    .trim()
    .replace(/\s+/g,"_");

  return filename;
}

function extractYear(value){
  if(!value) return null;
  const match = String(value).match(/\b(16|17|18|19|20)\d{2}\b/);
  return match ? parseInt(match[0],10) : null;
}

function calculateAge(person){
  if(!person) return "";

  const bornYear = extractYear(person.born);
  if(!bornYear) return "";

  const diedYear = extractYear(person.died);

  if(diedYear){
    const age = diedYear - bornYear;
    return age >= 0 ? age + " år" : "";
  }

  const now = new Date().getFullYear();
  const age = now - bornYear;

  if(age < 0 || age > 120) return "";
  return age + " år";
}

function deepClone(obj){
  return JSON.parse(JSON.stringify(obj));
}

function escapeHtml(value){
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function showError(html){
  const msg = document.getElementById("messageArea");
  msg.innerHTML = `<div class="error">${html}</div>`;
}

function showSuccess(html){
  const msg = document.getElementById("messageArea");
  msg.innerHTML = `<div class="success">${html}</div>`;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateStatus(text){
  const el = document.getElementById("statusText");
  if(el) el.textContent = text;
}

function reloadPage(){
  if(unsavedChanges){
    const ok = confirm("Du har osparade ändringar i sidan. Vill du verkligen ladda om?");
    if(!ok) return;
  }
  location.reload();
}

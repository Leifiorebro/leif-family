<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fotosida</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:#222;
}

header{
  background:white;
  border-bottom:1px solid #ddd;
  padding:14px 18px;
  position:sticky;
  top:0;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

header h1{
  margin:0;
  font-size:24px;
  color:#2c3e50;
}

.navButtons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.navButtons a,
.navButtons button{
  display:inline-block;
  padding:8px 12px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  text-decoration:none;
  color:#222;
  font-size:14px;
}

.navButtons a:hover,
.navButtons button:hover{
  background:#f0f0f0;
}

#container{
  max-width:1320px;
  margin:0 auto;
  padding:24px 16px 40px;
}

.card{
  background:white;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  overflow:hidden;
  margin-bottom:24px;
}

.hero{
  display:grid;
  grid-template-columns:minmax(280px, 440px) 1fr;
  gap:0;
}

.heroPhoto{
  background:#fff;
  border-right:1px solid #eee;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:420px;
  padding:14px;
}

.heroPhoto img{
  width:100%;
  max-width:100%;
  max-height:700px;
  object-fit:contain;
  display:block;
  background:white;
}

.heroInfo{
  padding:24px 24px 18px;
}

.heroInfo h2{
  margin:0 0 12px;
  font-size:30px;
  color:#2c3e50;
}

.meta{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:8px 12px;
  margin-top:10px;
}

.metaLabel{
  font-weight:bold;
  color:#444;
}

.metaValue{
  color:#222;
}

.section{
  background:white;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  padding:18px;
  margin-bottom:22px;
}

.section h3{
  margin:0 0 14px;
  font-size:22px;
  color:#2c3e50;
}

.sectionToolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:0 0 14px;
}

.sectionToolbar button{
  padding:8px 12px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.sectionToolbar button:hover{
  background:#f0f0f0;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:16px;
}

.thumb{
  background:white;
  border:1px solid #eee;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  display:flex;
  flex-direction:column;
}

.thumb img{
  width:100%;
  height:280px;
  object-fit:contain;
  background:white;
  display:block;
}

.thumbCaptionWrap{
  border-top:1px solid #f0f0f0;
  background:#fafafa;
  padding:10px;
}

.thumbCaptionLabel{
  font-size:12px;
  font-weight:bold;
  color:#555;
  margin-bottom:6px;
}

.thumbCaption{
  width:100%;
  min-height:90px;
  max-height:150px;
  resize:vertical;
  overflow-y:auto;
  padding:10px;
  font-size:13px;
  line-height:1.45;
  border:1px solid #d8d8d8;
  border-radius:8px;
  font-family:Arial, Helvetica, sans-serif;
  background:white;
}

.thumbCaption:focus{
  outline:none;
  border-color:#6ea8d6;
  box-shadow:0 0 0 3px rgba(110,168,214,0.15);
}

.captionButtons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}

.captionButtons button{
  padding:6px 10px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.captionButtons button:hover{
  background:#f0f0f0;
}

.relGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
  gap:12px;
}

.relCard{
  border:1px solid #eee;
  border-radius:10px;
  padding:12px;
  background:#fafafa;
}

.relCard h4{
  margin:0 0 8px;
  font-size:16px;
  color:#444;
}

.relList{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.relLink{
  display:inline-block;
  text-decoration:none;
  color:#1d6fa5;
  padding:6px 8px;
  border-radius:8px;
}

.relLink:hover{
  background:#eef7fd;
}

.notice{
  background:#fff8e1;
  border:1px solid #f0d68a;
  color:#6b5500;
  padding:12px 14px;
  border-radius:10px;
}

.error{
  background:#ffecec;
  border:1px solid #f0b3b3;
  color:#8a1f1f;
  padding:12px 14px;
  border-radius:10px;
}

.success{
  background:#e9f8ec;
  border:1px solid #9ed7aa;
  color:#1f6b2a;
  padding:12px 14px;
  border-radius:10px;
}

.small{
  font-size:13px;
  color:#666;
  line-height:1.5;
}

.loading{
  text-align:center;
  padding:40px 10px;
  font-size:18px;
  color:#666;
}

.statusBar{
  position:sticky;
  bottom:0;
  z-index:15;
  background:#ffffffee;
  backdrop-filter:blur(6px);
  border-top:1px solid #ddd;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.statusText{
  font-size:14px;
  color:#444;
}

.statusActions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.statusActions button{
  padding:8px 12px;
  border:1px solid #bbb;
  background:white;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.statusActions button:hover{
  background:#f0f0f0;
}

@media (max-width:900px){
  .hero{
    grid-template-columns:1fr;
  }

  .heroPhoto{
    border-right:none;
    border-bottom:1px solid #eee;
    min-height:280px;
  }

  .meta{
    grid-template-columns:1fr;
  }

  .gallery{
    grid-template-columns:1fr;
  }
}

/* ── Drag-and-drop ── */
.thumb{ cursor:grab; transition:box-shadow .15s,opacity .15s; position:relative; }
.thumb.dragging{ opacity:.4; box-shadow:0 0 0 3px #6ea8d6; cursor:grabbing; }
.thumb.drag-over{ box-shadow:0 0 0 3px #1d4ed8; }
.dragHandle{
  position:absolute; top:7px; left:7px;
  background:rgba(255,255,255,.88); border-radius:6px;
  padding:3px 7px; font-size:15px; cursor:grab;
  user-select:none; z-index:5; line-height:1;
}
.deleteBtn{
  position:absolute; top:7px; right:7px;
  background:rgba(255,255,255,.92); border:1px solid #f0b3b3;
  color:#b91c1c; border-radius:6px; padding:3px 9px;
  font-size:13px; cursor:pointer; z-index:5; line-height:1;
}
.deleteBtn:hover{ background:#ffecec; }

/* ── Add-photo panel ── */
#addPhotoPanel{
  background:white; border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  padding:20px; margin-bottom:22px;
}
#addPhotoPanel h3{ margin:0 0 14px; font-size:22px; color:#2c3e50; }
.addRow{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
.addRow label{ display:flex; align-items:center; gap:8px; font-size:14px; flex:1; }
.addRow input[type=file]{ flex:1; font-size:13px; }
.btnBlue{
  padding:9px 16px; border:none; border-radius:8px;
  background:#1d4ed8; color:white; font-size:14px;
  cursor:pointer; white-space:nowrap;
}
.btnBlue:hover{ background:#1e40af; }
.btnGray{
  padding:8px 14px; border:1px solid #bbb; background:white;
  border-radius:8px; font-size:14px; cursor:pointer; white-space:nowrap;
}
.btnGray:hover{ background:#f0f0f0; }

/* ── Image picker modal ── */
#imgPickerModal{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.58); z-index:1000;
  align-items:center; justify-content:center;
}
#imgPickerModal.open{ display:flex; }
#imgPickerBox{
  background:white; border-radius:14px; padding:22px;
  width:min(720px,95vw); max-height:82vh;
  display:flex; flex-direction:column; gap:12px;
}
#imgPickerBox h3{ margin:0; font-size:20px; color:#2c3e50; }
#imgPickerFilter{
  padding:8px 10px; border:1px solid #ccc;
  border-radius:8px; font-size:14px; width:100%;
}
#imgPickerList{
  overflow-y:auto; flex:1;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:10px; padding:2px;
}
.pickerThumb{
  border:2px solid transparent; border-radius:10px;
  overflow:hidden; cursor:pointer; background:#f5f5f5;
  display:flex; flex-direction:column; align-items:center;
  padding:6px; transition:border-color .12s;
}
.pickerThumb:hover{ border-color:#1d4ed8; }
.pickerThumb img{ width:100%; height:88px; object-fit:contain; background:white; }
.pickerThumb span{ font-size:11px; color:#444; margin-top:4px; text-align:center; word-break:break-all; }
.pickerFooter{ display:flex; gap:8px; justify-content:flex-end; }
</style>
</head>
<body>

<header>
  <h1>Fotosida</h1>
  <div class="navButtons">
    <a id="backToPerson" href="#">👤 Personblad</a>
    <a id="backToTree" href="index.html">🌳 Släktträd</a>
    <button onclick="reloadPage()">↻ Ladda om</button>
  </div>
</header>

<div id="container">
  <div id="messageArea"></div>
  <div id="content" class="loading">Laddar persondata...</div>
</div>

<div class="statusBar">
  <div class="statusText" id="statusText">Inga ändringar ännu.</div>
  <div class="statusActions">
    <button onclick="saveCurrentPersonCaptions()">💾 Spara bildtexter (lokalt i sidan)</button>
    <button onclick="resetCurrentPersonCaptions()">↺ Återställ denna persons bildtexter</button>
    <button onclick="downloadUpdatedJson()">⬇ Ladda ner uppdaterad slaktdata.json</button>
  </div>
</div>

<script>
/* =========================================================
   KONFIGURATION
   ========================================================= */

const DATA_PATH = "data/slaktdata.json";
const EXTRA_IMAGE_VARIANTS = 30; // används endast som fallback om photos saknas

/* =========================================================
   GLOBALT
   ========================================================= */

let store = null;
let originalStore = null;
let currentId = null;
let currentImageList = []; // [{src:"...", caption:"...", sourceType:"photosObject|photosString|legacyCaption|auto"}]
let unsavedChanges = false;

/* =========================================================
   START
   ========================================================= */

window.addEventListener("DOMContentLoaded", init);

async function init(){
  const params = new URLSearchParams(window.location.search);
  currentId = params.get("id");

  if(!currentId){
    showError("Ingen person angiven i länken. Öppna sidan som <strong>fotosida.html?id=PERSON_ID</strong>.");
    return;
  }

  document.getElementById("backToPerson").href = "person.html?id=" + encodeURIComponent(currentId);

  try{
    const res = await fetch(DATA_PATH, { cache: "no-store" });

    if(!res.ok){
      throw new Error("Kunde inte läsa " + DATA_PATH + " (HTTP " + res.status + ")");
    }

    const data = await res.json();

    store = {
      people: data.people || {},
      parentsOf: data.parentsOf || {},
      spousesOf: data.spousesOf || {},
      currentId: data.currentId || null
    };

    originalStore = deepClone(store);

    normalizeStore();

    if(!store.people[currentId]){
      showError("Personen med id <strong>" + escapeHtml(currentId) + "</strong> hittades inte i <strong>" + escapeHtml(DATA_PATH) + "</strong>.");
      return;
    }

    await renderPersonPage(currentId);
    updateStatus("Data inläst från " + DATA_PATH + ". Redigera bildtexter direkt under bilderna.");

  }catch(err){
    console.error(err);
    showManualLoadOption();
  }
}

function showManualLoadOption(){
  const msg = document.getElementById("messageArea");
  msg.innerHTML = `
    <div class="error">
      <strong>Kunde inte ladda data/slaktdata.json automatiskt.</strong><br><br>
      Det här händer om du öppnar sidan lokalt (file://) eller om GitHub Pages ännu inte är aktiverat.<br><br>
      <strong>Lösning 1 – GitHub Pages:</strong> Kontrollera att GitHub Pages är aktiverat under
      <em>Settings → Pages → Source → main branch</em> i ditt repo.<br><br>
      <strong>Lösning 2 – Ladda in filen manuellt:</strong><br>
      <label style="display:inline-block;margin-top:8px;padding:8px 14px;background:#1d4ed8;color:white;border-radius:8px;cursor:pointer;font-size:14px;">
        📂 Välj slaktdata.json från din dator
        <input type="file" accept="application/json" style="display:none" onchange="loadJsonManually(event)">
      </label>
    </div>`;
}

function loadJsonManually(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const data = JSON.parse(e.target.result);
      store = {
        people: data.people || {},
        parentsOf: data.parentsOf || {},
        spousesOf: data.spousesOf || {},
        currentId: data.currentId || null
      };
      originalStore = deepClone(store);
      normalizeStore();
      const msg = document.getElementById("messageArea");
      msg.innerHTML = "";
      if(!store.people[currentId]){
        showError("Personen med id <strong>" + escapeHtml(currentId) + "</strong> hittades inte i den inlästa filen.");
        return;
      }
      await renderPersonPage(currentId);
      updateStatus("Data inläst manuellt från " + escapeHtml(file.name) + ".");
    }catch(err){
      showError("Kunde inte tolka JSON-filen: " + escapeHtml(err.message));
    }
  };
  reader.readAsText(file);
}

window.addEventListener("beforeunload", function(e){
  if(!unsavedChanges) return;
  e.preventDefault();
  e.returnValue = "";
});

/* =========================================================
   NORMALISERING / DATA
   ========================================================= */

function normalizeStore(){
  if(!store || typeof store !== "object"){
    store = { people:{}, parentsOf:{}, spousesOf:{}, currentId:null };
  }

  store.people = store.people || {};
  store.parentsOf = store.parentsOf || {};
  store.spousesOf = store.spousesOf || {};

  Object.keys(store.people).forEach(id=>{
    const p = store.people[id] || {};
    p.id = p.id || id;

    if(!p.birthPlace && p.birthParish) p.birthPlace = p.birthParish;
    if(!p.deathPlace && p.deathParish) p.deathPlace = p.deathParish;

    if(!Array.isArray(p.photos)){
      p.photos = [];
    }

    if(!p.photoCaptions || typeof p.photoCaptions !== "object"){
      p.photoCaptions = {};
    }

    store.people[id] = p;
  });

  Object.keys(store.parentsOf).forEach(cid=>{
    if(!store.people[cid]){
      delete store.parentsOf[cid];
      return;
    }

    const arr = Array.isArray(store.parentsOf[cid]) ? store.parentsOf[cid] : [];
    store.parentsOf[cid] = [
      arr[0] && store.people[arr[0]] ? arr[0] : null, // Far
      arr[1] && store.people[arr[1]] ? arr[1] : null  // Mor
    ];
  });

  const cleaned = {};
  Object.keys(store.people).forEach(id=> cleaned[id] = []);

  Object.keys(store.spousesOf).forEach(id=>{
    if(!store.people[id]) return;
    const list = Array.isArray(store.spousesOf[id]) ? store.spousesOf[id] : [];

    list.forEach(sid=>{
      if(!store.people[sid]) return;
      if(id === sid) return;

      if(!cleaned[id].includes(sid)) cleaned[id].push(sid);
      if(!cleaned[sid].includes(id)) cleaned[sid].push(id);
    });
  });

  store.spousesOf = cleaned;
}

function getPerson(id){
  return store && store.people ? store.people[id] : null;
}

function getDisplayName(id){
  const p = getPerson(id);
  return p && p.name ? p.name : "(saknas)";
}

function childrenOf(pid){
  const arr = [];

  Object.entries(store.parentsOf).forEach(([cid, parents])=>{
    if(Array.isArray(parents) && parents.includes(pid)){
      arr.push(cid);
    }
  });

  arr.sort((a,b)=>{
    const pa = getPerson(a) || {};
    const pb = getPerson(b) || {};

    const ya = extractYear(pa.born) || 9999;
    const yb = extractYear(pb.born) || 9999;

    if(ya !== yb) return ya - yb;

    return (pa.name || "").localeCompare((pb.name || ""), "sv", { sensitivity:"base" });
  });

  return arr;
}

/* =========================================================
   RENDER
   ========================================================= */

async function renderPersonPage(personId){
  const person = getPerson(personId);

  if(!person){
    showError("Personen kunde inte hittas.");
    return;
  }

  const container = document.getElementById("content");
  container.className = "";
  container.innerHTML = "";

  const imageBase = sanitizeNameForImage(person.name || "");
  currentImageList = await getPersonImages(person);

  const heroImage = currentImageList.length ? currentImageList[0].src : "images/default.jpg";

  const age = calculateAge(person);
  const parents = store.parentsOf[personId] || [null, null];
  const spouses = (store.spousesOf[personId] || []).slice().sort((a,b)=>
    getDisplayName(a).localeCompare(getDisplayName(b), "sv", { sensitivity:"base" })
  );
  const kids = childrenOf(personId);

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="hero">
      <div class="heroPhoto">
        <img src="${heroImage}" alt="${escapeHtml(person.name || "")}">
      </div>
      <div class="heroInfo">
        <h2>${escapeHtml(person.name || "Namnlös person")}</h2>

        <div class="meta">
          <div class="metaLabel">ID</div>
          <div class="metaValue">${escapeHtml(person.id || personId)}</div>

          <div class="metaLabel">Född</div>
          <div class="metaValue">${escapeHtml(person.born || "-")}</div>

          <div class="metaLabel">Död</div>
          <div class="metaValue">${escapeHtml(person.died || "-")}</div>

          <div class="metaLabel">Ålder</div>
          <div class="metaValue">${escapeHtml(age || "-")}</div>

          <div class="metaLabel">Födelseförsamling</div>
          <div class="metaValue">${escapeHtml(person.birthPlace || person.birthParish || "-")}</div>

          <div class="metaLabel">Dödsförsamling</div>
          <div class="metaValue">${escapeHtml(person.deathPlace || person.deathParish || "-")}</div>

          <div class="metaLabel">Yrke</div>
          <div class="metaValue">${escapeHtml(person.job || "-")}</div>
        </div>

        <div style="margin-top:18px;" class="navButtons">
          <a href="person.html?id=${encodeURIComponent(personId)}">👤 Öppna personblad</a>
          <a href="index.html">🌳 Till släktträdet</a>
        </div>
      </div>
    </div>
  `;

  container.appendChild(card);

  renderGallerySection(container, person, imageBase);
  renderRelationsSection(container, personId, parents, spouses, kids);
  renderInfoSection(container, person, imageBase);
}

function renderGallerySection(container, person, imageBase){
  /* ── "Lägg till foto" panel ── */
  const addPanel = document.createElement("div");
  addPanel.id = "addPhotoPanel";
  addPanel.innerHTML = `
    <h3>Lägg till foto</h3>
    <div class="addRow">
      <button class="btnBlue" onclick="openImgPicker()">🖼 Välj från images/ på GitHub</button>
    </div>
    <div class="addRow">
      <label>
        📂 Ladda upp lokal fil:
        <input type="file" accept="image/*" multiple onchange="addLocalImages(event)">
      </label>
    </div>
  `;
  container.appendChild(addPanel);

  /* ── Gallery section ── */
  const gallerySection = document.createElement("div");
  gallerySection.className = "section";
  gallerySection.id = "gallerySection";

  gallerySection.innerHTML = `<h3>Fotogalleri</h3>`;

  const toolbar = document.createElement("div");
  toolbar.className = "sectionToolbar";
  toolbar.innerHTML = `
    <button class="btnGray" onclick="resetCurrentPersonCaptions()">↺ Återställ bildtexter</button>
    <button class="btnGray" onclick="downloadUpdatedJson()">⬇ Ladda ner uppdaterad slaktdata.json</button>
  `;
  gallerySection.appendChild(toolbar);

  const grid = document.createElement("div");
  grid.className = "gallery";
  grid.id = "galleryGrid";
  gallerySection.appendChild(grid);

  buildGalleryGrid(grid, person.name || "");
  container.appendChild(gallerySection);
}

function buildGalleryGrid(grid, personName){
  grid.innerHTML = "";
  if(currentImageList.length){
    currentImageList.forEach((imgObj, index)=>{
      grid.appendChild(makeThumbCard(imgObj, index, personName));
    });
    initDrag(grid);
  }else{
    grid.innerHTML = `<div class="notice" style="grid-column:1/-1">
      Inga bilder tillagda ännu.<br>Klicka <strong>Välj från images/ på GitHub</strong> eller ladda upp en lokal fil ovan.
    </div>`;
  }
}

function makeThumbCard(imgObj, index, personName){
  const box = document.createElement("div");
  box.className = "thumb";
  box.draggable = true;
  box.dataset.index = String(index);
  box.innerHTML = `
    <span class="dragHandle" title="Dra för att sortera">⠿</span>
    <button class="deleteBtn" onclick="deleteImage(${index})">✕ Ta bort</button>
    <img src="${escapeHtml(imgObj.src)}" alt="${escapeHtml(personName)} bild ${index+1}"
         onerror="this.style.opacity='.3'">
    <div class="thumbCaptionWrap">
      <textarea class="thumbCaption" id="caption_${index}" data-index="${index}"
        placeholder="Skriv bildtext här..."
        oninput="captionChanged(${index},this.value)"
      >${escapeHtml(imgObj.caption||"")}</textarea>
    </div>
  `;
  return box;
}

function renderRelationsSection(container, personId, parents, spouses, kids){
  const relSection = document.createElement("div");
  relSection.className = "section";

  relSection.innerHTML = `<h3>Släktrelationer</h3>`;

  const relGrid = document.createElement("div");
  relGrid.className = "relGrid";

  relGrid.appendChild(makeRelationCard(

/* =========================================================
   BILDER - HUVUDLOGIK
   ========================================================= */

async function getPersonImages(person){
  if(!person) return [];

  // 1) Huvudlösning: photos-lista
  if(Array.isArray(person.photos) && person.photos.length){
    const existing = [];

    for(const item of person.photos){
      // Ny rekommenderad modell: {src, caption}
      if(item && typeof item === "object" && !Array.isArray(item) && typeof item.src === "string"){
        const src = item.src.trim();
        if(!src) continue;

        const ok = await imageExists(src);
        if(ok){
          existing.push({
            src,
            caption: typeof item.caption === "string" ? item.caption : "",
            sourceType: "photosObject"
          });
        }
        continue;
      }

      // Äldre modell: "images/fil.jpg"
      if(typeof item === "string"){
        const src = item.trim();
        if(!src) continue;

        const ok = await imageExists(src);
        if(ok){
          const legacyCaption = getLegacyCaption(person, existing.length);
          existing.push({
            src,
            caption: legacyCaption,
            sourceType: "photosString"
          });
        }
      }
    }

    return existing;
  }

  // 2) Fallback: images/{id}.jpg  (används av index.html och person.html)
  if(person.id){
    const idSrc = "images/" + person.id + ".jpg";
    const ok = await imageExists(idSrc);
    if(ok){
      return [{ src: idSrc, caption: getLegacyCaption(person, 0), sourceType: "photosObject" }];
    }
    // Prova också photoId-fältet om det skiljer sig från id
    if(person.photoId && person.photoId !== person.id){
      const pidSrc = "images/" + person.photoId + ".jpg";
      const ok2 = await imageExists(pidSrc);
      if(ok2){
        return [{ src: pidSrc, caption: getLegacyCaption(person, 0), sourceType: "photosObject" }];
      }
    }
  }

  // 3) Sista fallback: automatisk namnmatchning på personens namn
  const imageBase = sanitizeNameForImage(person.name || "");
  const found = await collectExistingImages(imageBase);

  return found.map((src, index)=>({
    src,
    caption: getLegacyCaption(person, index),
    sourceType: "auto"
  }));
}

async function collectExistingImages(baseName){
  const candidates = [];

  candidates.push("images/" + baseName + ".jpg");
  candidates.push("images/" + baseName + ".jpeg");
  candidates.push("images/" + baseName + ".png");

  for(let i = 1; i <= EXTRA_IMAGE_VARIANTS; i++){
    candidates.push("images/" + baseName + "_" + i + ".jpg");
    candidates.push("images/" + baseName + "_" + i + ".jpeg");
    candidates.push("images/" + baseName + "_" + i + ".png");
  }

  const existing = [];

  for(const src of candidates){
    const ok = await imageExists(src);
    if(ok){
      existing.push(src);
    }
  }

  return existing;
}

function imageExists(src){
  return new Promise(resolve=>{
    const img = new Image();

    img.onload = ()=> resolve(true);
    img.onerror = ()=> resolve(false);

    const separator = src.includes("?") ? "&" : "?";
    img.src = src + separator + "v=" + Date.now();
  });
}

function getImageSourceLabel(sourceType){
  switch(sourceType){
    case "photosObject": return "photos-objekt (rekommenderad)";
    case "photosString": return "photos-sträng (äldre modell)";
    case "auto": return "automatisk namnmatchning";
    default: return "okänd";
  }
}

/* =========================================================
   BILDTEXTER - NY HUVUDMODELL
   ========================================================= */

function getLegacyCaption(person, imageIndex){
  const captions = person && person.photoCaptions ? person.photoCaptions : null;
  if(!captions) return "";

  if(imageIndex === 0){
    return captions.main || "";
  }

  return captions[String(imageIndex)] || "";
}

/* Caption auto-saves while typing */
function captionChanged(index, value){
  if(currentImageList[index] !== undefined){
    currentImageList[index].caption = value;
    unsavedChanges = true;
    updateStatus("Bildtext uppdaterad — ladda ner JSON för permanent sparning.");
  }
}

/* Delete image + caption, re-render */
function deleteImage(index){
  if(!confirm("Ta bort bild " + (index+1) + " och dess bildtext?")) return;
  currentImageList.splice(index, 1);
  unsavedChanges = true;
  const p = getPerson(currentId);
  const grid = document.getElementById("galleryGrid");
  if(grid) buildGalleryGrid(grid, p ? p.name||"" : "");
  updateStatus("Bild borttagen — ladda ner JSON för att spara.");
}

/* Drag-and-drop reorder */
function initDrag(grid){
  let dragSrc = null;
  grid.querySelectorAll(".thumb").forEach(card=>{
    card.addEventListener("dragstart", e=>{
      dragSrc = card;
      setTimeout(()=> card.classList.add("dragging"), 0);
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", ()=>{
      card.classList.remove("dragging");
      grid.querySelectorAll(".thumb").forEach(c=> c.classList.remove("drag-over"));
      /* Rebuild currentImageList from DOM order */
      const reordered = [];
      grid.querySelectorAll(".thumb").forEach(c=>{
        const i = parseInt(c.dataset.index, 10);
        if(!isNaN(i) && currentImageList[i]) reordered.push({...currentImageList[i]});
      });
      currentImageList = reordered;
      const p = getPerson(currentId);
      buildGalleryGrid(grid, p ? p.name||"" : "");
      unsavedChanges = true;
      updateStatus("Ordning ändrad — ladda ner JSON för att spara.");
    });
    card.addEventListener("dragover", e=>{
      e.preventDefault();
      if(card === dragSrc) return;
      grid.querySelectorAll(".thumb").forEach(c=> c.classList.remove("drag-over"));
      card.classList.add("drag-over");
      const r = card.getBoundingClientRect();
      const after = e.clientY > r.top + r.height/2;
      grid.insertBefore(dragSrc, after ? card.nextSibling : card);
    });
  });
}

/* ══ Image picker ══ */
let _pickerFiles = [];

async function openImgPicker(){
  const modal = document.getElementById("imgPickerModal");
  modal.classList.add("open");
  const list = document.getElementById("imgPickerList");
  list.innerHTML = "<div class='loading'>Hämtar bildlista…</div>";
  document.getElementById("imgPickerFilter").value = "";

  try{
    let files = [];
    /* Try GitHub API */
    const m = location.hostname.match(/^([^.]+)\.github\.io$/);
    if(m){
      const owner = m[1];
      const parts = location.pathname.replace(/\\/g,"/").split("/").filter(Boolean);
      const repo  = parts[0] || "";
      if(repo){
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/images`);
        if(res.ok){
          const data = await res.json();
          files = Array.isArray(data)
            ? data.filter(f=> /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name)).map(f=> f.name)
            : [];
        }
      }
    }
    /* Fallback: collect from store */
    if(!files.length && store && store.people){
      const set = new Set();
      Object.values(store.people).forEach(p=>{
        if(Array.isArray(p.photos)) p.photos.forEach(item=>{
          const s = typeof item==="string" ? item : (item&&item.src ? item.src : "");
          if(s) set.add(s.replace(/^images\//,""));
        });
      });
      files = Array.from(set).sort();
    }
    _pickerFiles = files;
    renderPickerList(files);
  }catch(err){
    list.innerHTML = `<div class="error">Kunde inte hämta lista: ${escapeHtml(err.message)}</div>`;
  }
}

function renderPickerList(files){
  const list = document.getElementById("imgPickerList");
  list.innerHTML = "";
  if(!files.length){
    list.innerHTML = "<div class='small' style='padding:12px;grid-column:1/-1'>Inga bilder hittades. Bildlistan hämtas via GitHub API — fungerar bara på github.io.</div>";
    return;
  }
  files.forEach(fname=>{
    const src = "images/" + fname;
    const div = document.createElement("div");
    div.className = "pickerThumb";
    div.innerHTML = `<img src="${escapeHtml(src)}" onerror="this.style.display='none'"><span>${escapeHtml(fname)}</span>`;
    div.onclick = ()=>{ pickImage(src); };
    list.appendChild(div);
  });
}

function filterPickerList(){
  const q = document.getElementById("imgPickerFilter").value.toLowerCase();
  renderPickerList(_pickerFiles.filter(f=> f.toLowerCase().includes(q)));
}

function pickImage(src){
  if(currentImageList.some(i=> i.src===src)){ alert("Bilden är redan tillagd."); return; }
  currentImageList.push({ src, caption:"", sourceType:"photosObject" });
  unsavedChanges = true;
  const p = getPerson(currentId);
  const grid = document.getElementById("galleryGrid");
  if(grid) buildGalleryGrid(grid, p ? p.name||"" : "");
  closeImgPicker();
  updateStatus("Bild tillagd — ladda ner JSON för att spara.");
}

function closeImgPicker(){
  document.getElementById("imgPickerModal").classList.remove("open");
}

/* Close picker on backdrop click */
document.addEventListener("click", e=>{
  const m = document.getElementById("imgPickerModal");
  if(m && e.target===m) closeImgPicker();
});

function addLocalImages(event){
  const files = Array.from(event.target.files);
  files.forEach(file=>{
    const src = "images/" + file.name;
    if(currentImageList.some(i=> i.src===src)){ alert("'" + file.name + "' är redan tillagd."); return; }
    currentImageList.push({ src, caption:"", sourceType:"photosObject" });
  });
  event.target.value = "";
  unsavedChanges = true;
  const p = getPerson(currentId);
  const grid = document.getElementById("galleryGrid");
  if(grid) buildGalleryGrid(grid, p ? p.name||"" : "");
  updateStatus("Bild(er) tillagda — ladda ner JSON för att spara.");
}

function saveCurrentPersonCaptions(){
  const person = getPerson(currentId);
  if(!person) return;

  // Viktigt: vi uppgraderar alltid till den bästa modellen: photos = [{src, caption}, ...]
  person.photos = currentImageList.map(img => ({
    src: img.src,
    caption: (img.caption || "").trim()
  }));

  // Äldre captions rensas bort för att undvika dubbla system
  if(person.photoCaptions){
    delete person.photoCaptions;
  }

  unsavedChanges = true;
  updateStatus("Alla bildtexter för aktuell person sparade i minnet enligt nya photos-modellen.");
  showSuccess("Alla bildtexter för <strong>" + escapeHtml(person.name || currentId) + "</strong> sparades i den nya rekommenderade <strong>photos</strong>-modellen. Klicka nu på <strong>Ladda ner uppdaterad slaktdata.json</strong>.");
}

function resetCurrentPersonCaptions(){
  if(!originalStore || !currentId) return;

  const originalPerson = originalStore.people && originalStore.people[currentId] ? originalStore.people[currentId] : null;
  const currentPerson = getPerson(currentId);

  if(!currentPerson) return;

  if(originalPerson){
    currentPerson.photos = deepClone(Array.isArray(originalPerson.photos) ? originalPerson.photos : []);
    currentPerson.photoCaptions = deepClone(originalPerson.photoCaptions || {});
  }else{
    currentPerson.photos = [];
    currentPerson.photoCaptions = {};
  }

  renderPersonPage(currentId).then(()=>{
    unsavedChanges = true;
    updateStatus("Bildtexter för aktuell person återställda till ursprungligt innehåll från inläst JSON.");
    showSuccess("Bildtexterna återställdes för aktuell person. Om du vill behålla återställningen: ladda ner uppdaterad JSON.");
  });
}

/* =========================================================
   EXPORT / NEDLADDNING
   ========================================================= */

function downloadUpdatedJson(){
  if(!store){
    showError("Ingen data finns att ladda ner.");
    return;
  }

  // Spara alltid aktuell persons bildtexter innan export
  saveCurrentPersonCaptions();

  const exportData = {
    people: store.people,
    parentsOf: store.parentsOf,
    spousesOf: store.spousesOf,
    currentId: store.currentId || currentId
  };

  const jsonText = JSON.stringify(exportData, null, 2);
  const blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "slaktdata.json";
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(()=> URL.revokeObjectURL(url), 1000);

  unsavedChanges = false;
  updateStatus("Uppdaterad slaktdata.json nedladdad. Ersätt data/slaktdata.json på GitHub med den nya filen.");
  showSuccess(
    "Den uppdaterade filen <strong>slaktdata.json</strong> har laddats ner.<br><br>" +
    "Nästa steg:<br>" +
    "1. Öppna din GitHub-repo<br>" +
    "2. Gå till mappen <strong>data</strong><br>" +
    "3. Ersätt filen <strong>slaktdata.json</strong> med den nedladdade versionen<br><br>" +
    "<strong>Obs:</strong> Denna sida sparar nu bilddata i den nya rekommenderade modellen:<br>" +
    "<code>photos: [{ src, caption }]</code>"
  );
}

/* =========================================================
   HJÄLPFUNKTIONER
   ========================================================= */

function sanitizeNameForImage(name){
  let filename = (name || "").toLowerCase();

  filename = filename
    .replace(/å/g,"a")
    .replace(/ä/g,"a")
    .replace(/ö/g,"o")
    .replace(/é/g,"e")
    .replace(/è/g,"e")
    .replace(/ê/g,"e")
    .replace(/ë/g,"e")
    .replace(/ü/g,"u")
    .replace(/ú/g,"u")
    .replace(/ù/g,"u")
    .replace(/û/g,"u")
    .replace(/ó/g,"o")
    .replace(/ò/g,"o")
    .replace(/ô/g,"o")
    .replace(/á/g,"a")
    .replace(/à/g,"a")
    .replace(/â/g,"a")
    .replace(/[^a-z0-9 ]/g,"")
    .trim()
    .replace(/\s+/g,"_");

  return filename;
}

function extractYear(value){
  if(!value) return null;
  const match = String(value).match(/\b(16|17|18|19|20)\d{2}\b/);
  return match ? parseInt(match[0],10) : null;
}

function calculateAge(person){
  if(!person) return "";

  const bornYear = extractYear(person.born);
  if(!bornYear) return "";

  const diedYear = extractYear(person.died);

  if(diedYear){
    const age = diedYear - bornYear;
    return age >= 0 ? age + " år" : "";
  }

  const now = new Date().getFullYear();
  const age = now - bornYear;

  if(age < 0 || age > 120) return "";
  return age + " år";
}

function deepClone(obj){
  return JSON.parse(JSON.stringify(obj));
}

function escapeHtml(value){
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function showError(html){
  const msg = document.getElementById("messageArea");
  msg.innerHTML = `<div class="error">${html}</div>`;
}

function showSuccess(html){
  const msg = document.getElementById("messageArea");
  msg.innerHTML = `<div class="success">${html}</div>`;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateStatus(text){
  const el = document.getElementById("statusText");
  if(el) el.textContent = text;
}

function reloadPage(){
  if(unsavedChanges){
    const ok = confirm("Du har osparade ändringar i sidan. Vill du verkligen ladda om?");
    if(!ok) return;
  }
  location.reload();
}

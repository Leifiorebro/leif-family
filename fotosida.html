<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fotosida</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:white;
border-bottom:1px solid #ccc;
padding:12px 18px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

#container{
max-width:1200px;
margin:auto;
padding:20px;
}

.section{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
}

.thumb{
border:1px solid #ddd;
border-radius:8px;
background:white;
padding:10px;
display:flex;
flex-direction:column;
}

.thumb img{
width:100%;
height:240px;
object-fit:contain;
background:#fff;
border-bottom:1px solid #eee;
}

textarea{
width:100%;
min-height:70px;
margin-top:6px;
}

.controls{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:6px;
}

button{
padding:6px 10px;
cursor:pointer;
border:1px solid #aaa;
border-radius:6px;
background:white;
}

button:hover{
background:#eee;
}

.dragging{
opacity:0.5;
}

.addBox{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.addBox input{
flex:1;
padding:6px;
}

.notice{
background:#fff3cd;
padding:10px;
border-radius:6px;
border:1px solid #ffeeba;
}
</style>
</head>

<body>

<header>
<h2>Fotosida</h2>
<div>
<a id="personLink">Personblad</a>
<button onclick="downloadJSON()">Ladda ner slaktdata.json</button>
</div>
</header>

<div id="container">

<div id="gallerySection" class="section">
<h3>Fotogalleri</h3>

<div id="gallery" class="gallery"></div>

<div class="addBox">
<input id="newImageSrc" placeholder="images/filnamn.jpg">
<input id="newImageCaption" placeholder="Bildtext">
<button onclick="addImage()">Lägg till bild</button>
</div>

</div>

</div>

<script>

const DATA="data/slaktdata.json"

let store
let person
let currentId
let images=[]

init()

async function init(){

const params=new URLSearchParams(location.search)
currentId=params.get("id")

document.getElementById("personLink").href="person.html?id="+currentId

const res=await fetch(DATA+"?v="+Date.now())
const data=await res.json()

store=data
person=store.people[currentId]

if(!person.photos)person.photos=[]

loadImages()
renderGallery()

}

async function loadImages(){

images=[]

if(person.photos.length){

for(const p of person.photos){

if(typeof p==="string"){

images.push({src:p,caption:""})

}else{

images.push({src:p.src,caption:p.caption||""})

}

}

}else{

// fallback

const base=sanitize(person.name)
const test=[".jpg",".jpeg",".png"]

for(const ext of test){

const src="images/"+base+ext
if(await imageExists(src)){
images.push({src,caption:""})
}

}

}

}

function renderGallery(){

const g=document.getElementById("gallery")
g.innerHTML=""

images.forEach((img,i)=>{

const div=document.createElement("div")
div.className="thumb"
div.draggable=true
div.dataset.index=i

div.addEventListener("dragstart",dragStart)
div.addEventListener("dragover",dragOver)
div.addEventListener("drop",drop)

div.innerHTML=`

<img src="${img.src}">

<textarea onchange="updateCaption(${i},this.value)">${img.caption||""}</textarea>

<div class="controls">

<button onclick="moveUp(${i})">↑</button>
<button onclick="moveDown(${i})">↓</button>
<button onclick="removeImage(${i})">Ta bort</button>

</div>

`

g.appendChild(div)

})

}

function updateCaption(i,val){
images[i].caption=val
}

function moveUp(i){
if(i===0)return
const t=images[i]
images[i]=images[i-1]
images[i-1]=t
renderGallery()
}

function moveDown(i){
if(i===images.length-1)return
const t=images[i]
images[i]=images[i+1]
images[i+1]=t
renderGallery()
}

function removeImage(i){
images.splice(i,1)
renderGallery()
}

function addImage(){

const src=document.getElementById("newImageSrc").value.trim()
const cap=document.getElementById("newImageCaption").value.trim()

if(!src)return

images.push({src,caption:cap})

document.getElementById("newImageSrc").value=""
document.getElementById("newImageCaption").value=""

renderGallery()

}

function dragStart(e){

e.dataTransfer.setData("index",e.target.dataset.index)

}

function dragOver(e){
e.preventDefault()
}

function drop(e){

e.preventDefault()

const from=parseInt(e.dataTransfer.getData("index"))
const to=parseInt(e.target.closest(".thumb").dataset.index)

const item=images.splice(from,1)[0]
images.splice(to,0,item)

renderGallery()

}

function downloadJSON(){

person.photos=images.map(i=>({
src:i.src,
caption:i.caption
}))

const json=JSON.stringify(store,null,2)

const blob=new Blob([json],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="slaktdata.json"
a.click()

}

function sanitize(name){

return name
.toLowerCase()
.replace(/å/g,"a")
.replace(/ä/g,"a")
.replace(/ö/g,"o")
.replace(/[^a-z0-9 ]/g,"")
.trim()
.replace(/\s+/g,"_")

}

function imageExists(src){

return new Promise(r=>{

const img=new Image()

img.onload=()=>r(true)
img.onerror=()=>r(false)

img.src=src+"?v="+Date.now()

})

}

</script>

</body>
</html>
